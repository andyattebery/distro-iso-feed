# Weekly variant discovery. Opens a PR; never pushes to main.
#
# It proposes VARIANTS of already-configured distros, never new distros -- so a
# distro deliberately left out of sources.yaml can never be re-added by automation.
#
# Every proposal is resolved against the live upstream before it is written, so the
# PR is mergeable as-is rather than a list of `TODO`s. The audit runs first and
# reports what could not be proposed at all, including pinned releases -- which
# produce no proposal, because a pinned source resolves perfectly.
#
# Requires: Settings -> Actions -> "Allow GitHub Actions to create and approve pull
# requests." Without it this fails with a 403 that reads like a token-scope bug.
name: discover

on:
  schedule:
    - cron: "42 5 * * 1" # Mondays
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2 # no floating `v8` tag; pin the patch
        with:
          enable-cache: true

      - run: uv sync --frozen

      # What upstream publishes that no variant tracks, and every source pinned to a
      # literal release. Runs even when nothing is proposable -- a pin produces no
      # proposal, because a pinned source resolves perfectly. Never `--strict`: an
      # upstream adding a spin must not fail this job before it can open the PR.
      - name: Audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run distro-iso-feed-audit --summary "$GITHUB_STEP_SUMMARY"

      # Written outside the tree: `create-pull-request` commits what it finds, and
      # the PR body is not part of the config change it is opening.
      - name: Enumerate upstream variants
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run distro-iso-feed-discover --pr-body "$RUNNER_TEMP/pr-body.md"

      # `create-pull-request` opens nothing when the tree is clean, so a run that
      # proposes nothing is silent by construction.
      - uses: peter-evans/create-pull-request@v8
        with:
          branch: discover/new-variants
          title: "discover: new upstream variants"
          commit-message: "discover: propose new variants"
          add-paths: config/sources.yaml
          delete-branch: true
          body-path: ${{ runner.temp }}/pr-body.md
