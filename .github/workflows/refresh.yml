# Daily refresh. Publishing IS the commit: once feed/ lands on main, the raw URL
# serves it. There is no deploy step, so there is nothing that can silently no-op.
name: refresh

on:
  schedule:
    - cron: "17 6 * * *" # daily, off the hour to dodge cron congestion
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Resolve everything and report, but write and commit nothing"
        type: boolean
        default: false

permissions:
  contents: write # commit the feed
  issues: write # the health gate opens/closes refresh-failure issues

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # checkout defaults to a shallow clone (fetch-depth: 1), and the commit
          # step below rebases onto origin/main to survive a push race. Rebasing a
          # shallow history fails; a full clone is cheap for a repo of this size.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.3.2
        # No floating `v8` tag exists for this action -- only exact `v8.x.y`.
        # `@v8` fails to resolve. Pin the patch.
        with:
          enable-cache: true

      - run: uv sync --frozen

      # No `pytest` gate here: the suite runs in `ci.yml` on push/PR, where a code
      # or runner-environment problem belongs. Gating the daily render on it once let
      # a gpg version bump on the runner block the whole feed. The render step below
      # loads the config first, so a broken config still fails this job loudly.

      # A manual `dry_run` resolves every source from a GitHub runner and writes
      # nothing. That is the only way to observe what this job actually sees:
      # geo-routed mirrors resolve from the runner's location, not from yours, so a
      # URL that works on a laptop can 404 here.
      - name: Resolve and render
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # lifts the 60/hr API limit
          DRY_RUN: ${{ inputs.dry_run == true }}
        run: |
          set -euo pipefail
          args=(--summary "$GITHUB_STEP_SUMMARY" --report "$RUNNER_TEMP/report.json")
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          uv run distro-iso-feed-refresh "${args[@]}"
        # The run record is the proof that this executed, so it carries the health
        # of every source. Individual failures never fail the job (that is what
        # failure isolation is for); all of them failing does.

      # `always()` so the (valid) feed still commits even when a source regressed and the health
      # gate below is about to fail the job. The empty-commit guard keeps determinism.
      - name: Commit if changed
        if: ${{ always() && !inputs.dry_run }}
        run: |
          set -euo pipefail
          git config user.name  "distro-iso-feed-bot"
          git config user.email "distro-iso-feed-bot@users.noreply.github.com"

          # docs/catalog.md is generated; docs/architecture.md and README.md are not.
          git add feed state docs/catalog.md

          # No empty commits. A run that changes nothing leaves no trace in the
          # history -- the workflow run itself is the evidence that it happened.
          if git diff --cached --quiet; then
            echo "nothing moved upstream; no commit"
            exit 0
          fi

          git commit -m "feed: $(date -u +%FT%TZ)"

          # A merged discover PR or a hand commit can land between checkout and push.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push race on attempt $attempt; retrying"
            sleep $((attempt * 5))
          done
          exit 1

      # Turn the failure report into issues and the job's pass/fail. `always()` so it runs after a
      # commit that returned 0-with-regressions AND so recovery-close runs on fully-passing days. The
      # gate's exit is authoritative and independent of the `gh` calls succeeding -- a GitHub API
      # hiccup can neither mask a real regression (still exits non-zero) nor invent one.
      - name: Health gate & issues
        if: ${{ always() && !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/report.json"
          if [ ! -f "$report" ]; then
            echo "no report (the render step failed before writing one); job already red"
            exit 0
          fi

          gh issue list --state open --json number,title,labels --limit 500 \
            > "$RUNNER_TEMP/open.json"
          uv run distro-iso-feed-refresh-gate \
            --report "$report" --open-issues "$RUNNER_TEMP/open.json" > "$RUNNER_TEMP/plan.json"

          # Ensure our labels exist before opening issues against them.
          for lbl in refresh-failure refresh-signing-key refresh-pin refresh-mass-outage; do
            gh label create "$lbl" --force >/dev/null 2>&1 || true
          done

          # Open new issues; close recovered ones. Both best-effort -- a `gh` failure warns but must
          # not change the gate exit computed below.
          jq -c '.to_open[]' "$RUNNER_TEMP/plan.json" | while read -r item; do
            title=$(jq -r '.title' <<<"$item")
            label=$(jq -r '.label' <<<"$item")
            jq -r '.body'  <<<"$item" > "$RUNNER_TEMP/body.md"
            gh issue create --title "$title" --label "$label" --body-file "$RUNNER_TEMP/body.md" \
              || echo "::warning::could not open issue: $title"
          done
          jq -c '.to_close[]' "$RUNNER_TEMP/plan.json" | while read -r item; do
            num=$(jq -r '.number' <<<"$item")
            gh issue close "$num" --comment "Resolved as of this run: $RUN_URL" \
              || echo "::warning::could not close issue #$num"
          done

          exit "$(jq -r '.exit_code' "$RUNNER_TEMP/plan.json")"
