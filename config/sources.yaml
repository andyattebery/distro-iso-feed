# The config IS the interface. Adding a distro is an edit here, not a code change.
# Every endpoint below was verified by extracting the artifact a strategy would use --
# a filename, a checksum line, a version token -- never by trusting an HTTP 200.
#
# `version_pattern` extracts the CHANGE-TOKEN, not the marketing version. If the bytes
# move, the token must move, or `guid()` stays put and no subscriber ever sees it.
# `ignore` lists decoys: artifacts co-located with the one we want. They belong here
# and not only in `match`, because `match` guards the feed while `ignore` guards the
# weekly discovery PR.

defaults:
  arch: x86_64
  user_agent: "distro-iso-feed/1.0 (+https://github.com/andyattebery/distro-iso-feed)"

distros:

  # ---------------------------------------------------------------- json_api (2)

  fedora:
    strategy: json_api
    page_url: "https://fedoraproject.org/"
    params:
      url: "https://fedoraproject.org/releases.json"
      # releases.json lists v42/43/44 side by side; json_api takes the max version.
      # The respin suffix (`-1.7`) lives only in the filename, and a respin ships a
      # new sha256 -- so the token comes from the filename, not the `version` field.
      # Two filename shapes: `...-44-1.7.x86_64.iso` (Live) and
      # `...-ostree-x86_64-44-1.7.iso` (Atomic). One pattern must serve both.
      version_pattern: '(\d+-\d+\.\d+)(?:\.[a-z0-9_]+)?\.iso$'
    variants:
      workstation: {label: "Fedora Workstation", select: {subvariant: Workstation, link_contains: "Workstation-Live"}}
      server: {label: "Fedora Server", select: {subvariant: Server, link_contains: "Server-netinst"}}
      kde: {label: "Fedora KDE Plasma", select: {subvariant: KDE, link_contains: "KDE-Desktop-Live"}}
      silverblue: {label: "Fedora Silverblue", select: {subvariant: Silverblue, link_contains: "ostree"}}
      kinoite: {label: "Fedora Kinoite", select: {subvariant: Kinoite, link_contains: "ostree"}}
      sericea: {label: "Fedora Sway Atomic", select: {subvariant: Sericea, link_contains: "ostree"}}
      onyx: {label: "Fedora Budgie Atomic", select: {subvariant: Onyx, link_contains: "ostree"}}
      cosmic-atomic: {label: "Fedora COSMIC Atomic", select: {subvariant: COSMIC-Atomic, link_contains: "ostree"}}
      # Desktop spins. `Mate` is the one whose subvariant never appears in its own
      # filename -- the artifact is `Fedora-MATE_Compiz-Live-...`.
      budgie: {label: "Fedora Budgie", select: {subvariant: Budgie, link_contains: "Budgie-Live"}}
      cinnamon: {label: "Fedora Cinnamon", select: {subvariant: Cinnamon, link_contains: "Cinnamon-Live"}}
      cosmic: {label: "Fedora COSMIC", select: {subvariant: COSMIC, link_contains: "COSMIC-Live"}}
      i3: {label: "Fedora i3", select: {subvariant: i3, link_contains: "i3-Live"}}
      lxde: {label: "Fedora LXDE", select: {subvariant: LXDE, link_contains: "LXDE-Live"}}
      lxqt: {label: "Fedora LXQt", select: {subvariant: LXQt, link_contains: "LXQt-Live"}}
      mate: {label: "Fedora MATE", select: {subvariant: Mate, link_contains: "MATE_Compiz-Live"}}
      miraclewm: {label: "Fedora MiracleWM", select: {subvariant: MiracleWM, link_contains: "MiracleWM-Live"}}
      sway: {label: "Fedora Sway", select: {subvariant: Sway, link_contains: "Sway-Live"}}
      xfce: {label: "Fedora Xfce", select: {subvariant: Xfce, link_contains: "Xfce-Live"}}
    discover:
      # `match` drops non-ISO rows (releases.json also lists qcow2/vhd/tar.xz), and
      # `ignore` is written against the FILENAME, not the variant key it produces:
      # the artifact is `Fedora-Cloud-Base-...`, never `Cloud_Base`.
      #
      # Group on the `subvariant` FIELD, not the filename. The artifact for Mate is
      # `Fedora-MATE_Compiz-Live-...`, so filename-grouping proposes `mate_compiz` --
      # a duplicate of the `mate` variant that already exists. `i3` has the opposite
      # problem: a digit that a letters-only regex silently skips.
      # Labs (Astronomy, Jam, Robotics, ...) stay ignored -- niche images, not spins.
      match: '\.iso$'
      group_field: subvariant
      group: '^([A-Za-z0-9_-]+)$'
      ignore: ["Cloud", "Container", "IoT", "Everything", "SoaS", "FEX", "WSL", "Python", "Scientific", "Astronomy", "Design", "Games", "Jam", "Robotics", "Security", "Mobile", "Minimal"]

  pop-os:
    strategy: json_api
    page_url: "https://pop.system76.com/"
    params:
      # `build` is what moves between respins of one release; version alone would not.
      version_fields: [version, build]
      # api.pop-os.org exposes exactly ONE endpoint -- `builds/{version}/{channel}`
      # (see pop-os/api, `Build::url()`). There is no release index to read, so the
      # release is PROBED. A literal here is how a feed serves 24.04 forever: a
      # pinned source resolves cleanly, publishes a valid checksum, and is wrong.
      #
      # Both `.04` and `.10`: the API still answers for 20.10 / 21.04 / 21.10, so
      # interims are a real shape and an LTS-only probe would be a fresh pin.
      # `requires: url` rejects a 200 carrying an error envelope, which Pop's own
      # web client guards against (`if (body.errors != null) throw`).
      probe_versions:
        generator: ubuntu_style
        requires: url
        template: "https://api.pop-os.org/builds/{version}/intel"
    variants:
      intel: {label: "Pop!_OS (Intel/AMD)", params: {url: "https://api.pop-os.org/builds/{version}/intel"}}
      nvidia: {label: "Pop!_OS (NVIDIA)", params: {url: "https://api.pop-os.org/builds/{version}/nvidia"}}
    discover:
      enumerable: false
      reason: "variants are separate endpoints (builds/<rel>/intel vs /nvidia), never rows in one document"

  # --------------------------------------------------------- directory_index (12)

  debian:
    strategy: directory_index
    page_url: "https://www.debian.org/"
    params:
      sums: "SHA512SUMS"
      sig: "SHA512SUMS.sign"
      # `debian-edu-...-netinst.iso` sits in the same SHA512SUMS. Anchor, or ship Edu.
      ignore: ["debian-edu-"]
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xDF9B9C49EAA9298432589D76DA87E80D6294BE9B
        fingerprint: DF9B9C49EAA9298432589D76DA87E80D6294BE9B
        covers: checksums
    variants:
      netinst:
        label: "Debian netinst"
        params:
          index: "https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/"
          match: '^debian-[0-9.]+-amd64-netinst\.iso$'
          version_pattern: 'debian-([0-9.]+)-amd64'
          # The torrent sits in a sibling dir, `bt-cd/`, with its own GPG-signed
          # SHA512SUMS -- so the entry carries both a direct download and a fully
          # verified torrent. `urljoin` resolves `../bt-cd/` against the ISO URL.
          torrent: "../bt-cd/{filename}.torrent"
          torrent_sums: "../bt-cd/SHA512SUMS"
      live-gnome: {label: "Debian Live GNOME", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-gnome\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-kde: {label: "Debian Live KDE", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-kde\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-xfce: {label: "Debian Live Xfce", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-xfce\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-cinnamon: {label: "Debian Live Cinnamon", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-cinnamon\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-mate: {label: "Debian Live MATE", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-mate\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-lxqt: {label: "Debian Live LXQt", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-lxqt\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-lxde: {label: "Debian Live LXDE", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-lxde\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-standard: {label: "Debian Live Standard", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-standard\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
    discover:
      # `debian-edu-` and `debian-mac-` never match: the regex needs digits where they
      # put a word, so both are skipped without needing an `ignore` entry.
      #
      # The edition group takes hyphens so `debian-junior` produces a key rather than
      # failing to match. A regex that cannot see an artifact cannot decide about it;
      # Junior is a Pure Blend, not a desktop edition, so it is ignored on purpose.
      match: '\.iso$'
      group: '^debian-(live)?-?[0-9.]+-amd64-([a-z-]+)\.iso$'
      ignore: ['-debian-junior\.iso$']

  kali:
    strategy: directory_index
    page_url: "https://www.kali.org/get-kali/"
    params:
      # NOT `current/`: a partial mirror. Use the versioned dir, which self-updates.
      #
      # `live`, `live-everything` and `installer-everything` are in SHA256SUMS but
      # 404 as direct downloads -- they ship by torrent. Their `match` therefore
      # selects the `.torrent`, and the torrent names the ISO it serves.
      #
      # SHA256SUMS is signed and lists BOTH the ISO and the `.torrent`, so the
      # torrent's bytes are checked against a signature before its infohash is
      # published. A torrent's own piece hashes only prove it agrees with itself.
      version_dir: "https://cdimage.kali.org/"
      version_dir_match: '^kali-\d{4}\.\d+$'
      index: "{version}/"
      sums: "SHA256SUMS"
      sig: "SHA256SUMS.gpg"
      version_pattern: 'kali-linux-([0-9.]+)-'
      ignore: ["arm64", "i386"]   # co-listed in the same SHA256SUMS
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x827C8569F2518CC677FECA1AED65462EC8D5E4C5
        fingerprint: 827C8569F2518CC677FECA1AED65462EC8D5E4C5
        covers: checksums
    variants:
      installer: {label: "Kali Installer", params: {match: '^kali-linux-[0-9.]+-installer-amd64\.iso$'}}
      installer-netinst: {label: "Kali NetInstaller", params: {match: '^kali-linux-[0-9.]+-installer-netinst-amd64\.iso$'}}
      installer-purple: {label: "Kali Purple", params: {match: '^kali-linux-[0-9.]+-installer-purple-amd64\.iso$'}}
      live: {label: "Kali Live", params: {torrent_only: true, match: '^kali-linux-[0-9.]+-live-amd64\.iso\.torrent$'}}
      live-everything: {label: "Kali Live (everything)", params: {torrent_only: true, match: '^kali-linux-[0-9.]+-live-everything-amd64\.iso\.torrent$'}}
      installer-everything: {label: "Kali Installer (everything)", params: {torrent_only: true, match: '^kali-linux-[0-9.]+-installer-everything-amd64\.iso\.torrent$'}}
    discover:
      # `.iso.torrent` rows must reach `group`, or the three torrent-only variants
      # above are reported UNEXPLAINED on every run. The suffix is NON-CAPTURING:
      # `variant_key` joins every capture group, so `(\.torrent)?` yields the key
      # `installer-.torrent`. The `.7z` torrents (hyperv/qemu/virtualbox/vmware)
      # need no `ignore` -- `match` requires `.iso` before the suffix.
      match: '\.iso(?:\.torrent)?$'
      group: '^kali-linux-[0-9.]+-(.+)-amd64\.iso(?:\.torrent)?$'
      ignore: [arm64, i386]

  void:
    strategy: directory_index
    page_url: "https://voidlinux.org/"
    params:
      index: "https://repo-default.voidlinux.org/live/current/"
      sums: "sha256sum.txt"
      version_pattern: 'x86_64-(\d{8})-'
      ignore: ["-musl-"]   # musl builds sit beside glibc in the same sha256sum.txt
    variants:
      base: {label: "Void Linux base", params: {match: '^void-live-x86_64-\d{8}-base\.iso$'}}
      xfce: {label: "Void Linux Xfce", params: {match: '^void-live-x86_64-\d{8}-xfce\.iso$'}}
    discover:
      group: '^void-live-x86_64-\d{8}-([a-z0-9]+)\.iso$'
      ignore: ["-musl-"]

  mint:
    strategy: directory_index
    mirror: true    # Mint is mirror-distributed; kernel.org is the smallest index
    page_url: "https://linuxmint.com/"
    params:
      version_dir: "https://mirrors.edge.kernel.org/linuxmint/stable/"
      index: "{version}/"
      sums: "sha256sum.txt"
      sig: "sha256sum.txt.gpg"
      version_pattern: 'linuxmint-([0-9.]+)-'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x27DEB15644C6B3CF3BD7D291300F846BA25BAE09
        fingerprint: 27DEB15644C6B3CF3BD7D291300F846BA25BAE09
        covers: checksums
    variants:
      cinnamon: {label: "Linux Mint Cinnamon", params: {match: '^linuxmint-[0-9.]+-cinnamon-64bit\.iso$'}}
      mate: {label: "Linux Mint MATE", params: {match: '^linuxmint-[0-9.]+-mate-64bit\.iso$'}}
      xfce: {label: "Linux Mint Xfce", params: {match: '^linuxmint-[0-9.]+-xfce-64bit\.iso$'}}
    discover:
      group: '^linuxmint-[0-9.]+-([a-z]+)-64bit\.iso$'

  arch:
    strategy: directory_index
    mirror: true
    page_url: "https://archlinux.org/download/"
    params:
      index: "https://geo.mirror.pkgbuild.com/iso/latest/"
      sums: "sha256sums.txt"
      sig: "{filename}.sig"
      # The dated name, not the `archlinux-x86_64.iso` symlink: the symlink offers
      # nothing to version by, though both share one hash in sha256sums.txt.
      match: '^archlinux-\d{4}\.\d{2}\.\d{2}-x86_64\.iso$'
      version_pattern: 'archlinux-(\d{4}\.\d{2}\.\d{2})-'
      # `{filename}.torrent` sits beside the ISO; no checksum is published for it, so
      # it is trust-on-first-use while the ISO stays GPG-signed.
      torrent: "{filename}.torrent"
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3E80CA1A8B89F69CBA57D98A76A5EF9054449A5C
        fingerprint: 3E80CA1A8B89F69CBA57D98A76A5EF9054449A5C
        covers: image
    variants:
      iso: {label: "Arch Linux"}
    discover:
      # Arch ships one ISO. The group needs an edition segment, which today's name has
      # not got -- so it yields no key and proposes nothing, while a hypothetical
      # `archlinux-lite-<date>-x86_64.iso` would surface immediately.
      match: '\.iso$'
      group: '^archlinux-([a-z]+)-\d{4}\.\d{2}\.\d{2}-x86_64\.iso$'

  ubuntu:
    strategy: directory_index
    page_url: "https://ubuntu.com/download"
    params:
      # releases.ubuntu.com lists 24.04.3, 24.04.4, 25.10 and 26.04 side by side.
      # A plain max-version would silently flip `desktop` from LTS to interim the
      # week 26.10 lands, so each channel is its own variant. Note `.04` alone does
      # not mean LTS: 25.04 is interim. `channel:` handles the even-year rule.
      version_dir: "https://releases.ubuntu.com/"
      index: "{version}/"
      sums: "SHA256SUMS"
      sig: "SHA256SUMS.gpg"
      version_pattern: 'ubuntu-([0-9.]+)-'
      # `{filename}.torrent` sits beside the ISO. Ubuntu does not publish a checksum
      # for it, so the torrent is trust-on-first-use -- but the ISO stays GPG-signed,
      # so `verify` is unchanged and the torrent is a bonus channel.
      torrent: "{filename}.torrent"
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x843938DF228D22F7B3742BC0D94AA3F0EFE21092
        fingerprint: 843938DF228D22F7B3742BC0D94AA3F0EFE21092
        covers: checksums
    variants:
      desktop-lts: {label: "Ubuntu Desktop LTS", params: {channel: lts, match: '^ubuntu-[0-9.]+-desktop-amd64\.iso$'}}
      live-server-lts: {label: "Ubuntu Server LTS", params: {channel: lts, match: '^ubuntu-[0-9.]+-live-server-amd64\.iso$'}}
      desktop-interim: {label: "Ubuntu Desktop interim", params: {channel: interim, match: '^ubuntu-[0-9.]+-desktop-amd64\.iso$'}}
      live-server-interim: {label: "Ubuntu Server interim", params: {channel: interim, match: '^ubuntu-[0-9.]+-live-server-amd64\.iso$'}}
    discover:
      enumerable: false
      reason: "variant keys carry an LTS/interim channel that no artifact filename encodes"

  freebsd:
    strategy: directory_index
    page_url: "https://www.freebsd.org/where/"
    params:
      version_dir: "https://download.freebsd.org/releases/amd64/amd64/ISO-IMAGES/"
      index: "{version}/"
      # BSD-format checksum file, and its NAME embeds the version. A literal `sums`
      # cannot express this; a GNU-only parser reads zero lines from it.
      sums: "CHECKSUM.SHA256-FreeBSD-{version}-RELEASE-amd64"
      version_pattern: 'FreeBSD-([0-9.]+)-RELEASE'
      ignore: ['\.iso\.xz$']
    variants:
      disc1: {label: "FreeBSD disc1", params: {match: '^FreeBSD-[0-9.]+-RELEASE-amd64-disc1\.iso$'}}
      dvd1: {label: "FreeBSD dvd1", params: {match: '^FreeBSD-[0-9.]+-RELEASE-amd64-dvd1\.iso$'}}
      bootonly: {label: "FreeBSD bootonly", params: {match: '^FreeBSD-[0-9.]+-RELEASE-amd64-bootonly\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^FreeBSD-[0-9.]+-RELEASE-amd64-([a-z0-9]+)\.iso$'
      ignore: ['\.iso\.xz$']

  # openSUSE is ONE distro whose variants override `strategy:`. Leap lists a version
  # directory; Tumbleweed is a fixed `*-Current.iso`. Splitting it into two fake
  # distros would be an artifact of the config rule, not of reality.
  opensuse:
    strategy: directory_index
    page_url: "https://get.opensuse.org/"
    params:
      # `leap/` also lists a legacy `42.3`, which outsorts `16.1` numerically.
      version_dir: "https://download.opensuse.org/distribution/leap/"
      version_dir_match: '^1[5-9]\.\d+$'
      # Only 15.6 exposes an `iso/` subdir today; 16.x has none. The probe takes the
      # highest dir that actually *contains* an artifact, so 16.x is picked up free
      # whenever it appears.
      index: "{version}/iso/"
      # `-Current.iso` exists but is NOT linked in the index, so directory_index
      # cannot see it. The listed `Build710.3-Media.iso` is the real artifact, and
      # its build number is a genuine change-token.
      sums: "{filename}.sha256"
      version_pattern: 'Leap-([0-9.]+)-\w+-x86_64-Build([0-9.]+)-Media'
      ignore: ["aarch64", "ppc64le", "s390x"]   # Leap ships four CPU arches, not two
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xAD485664E901B867051AB15F35A2F86E29B700A4
        fingerprint: AD485664E901B867051AB15F35A2F86E29B700A4
        covers: checksums
    variants:
      leap-dvd: {label: "openSUSE Leap DVD", params: {match: '^openSUSE-Leap-[0-9.]+-DVD-x86_64-Build[0-9.]+-Media\.iso$'}}
      leap-net: {label: "openSUSE Leap NET", params: {match: '^openSUSE-Leap-[0-9.]+-NET-x86_64-Build[0-9.]+-Media\.iso$'}}
      tumbleweed-dvd:
        label: "openSUSE Tumbleweed DVD"
        strategy: stable_symlink
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-DVD-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
          # The `.torrent` sits beside the `-Current.iso` symlink but names the dated
          # snapshot inside it. `attach_torrent` ties them by `version in info.name`
          # (version is `Snapshot<date>`), not by filename equality. No checksum for
          # the torrent; the ISO stays GPG-signed.
          torrent: "{filename}.torrent"
      tumbleweed-net:
        label: "openSUSE Tumbleweed NET"
        strategy: stable_symlink
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-NET-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
          torrent: "{filename}.torrent"
    discover:
      # Enumerates the Leap index only; Tumbleweed's variants resolve a fixed URL.
      # Capturing `Leap` as the first group yields `leap-dvd`, the configured key.
      match: '\.iso$'
      group: '^openSUSE-(Leap)-[0-9.]+-([A-Z]+)-x86_64-Build[0-9.]+-Media\.iso$'
      ignore: [aarch64, ppc64le, s390x]

  endeavouros:
    strategy: directory_index
    mirror: true    # EndeavourOS publishes no first-party download host at all
    page_url: "https://endeavouros.com/"
    params:
      index: "https://ftp.belnet.be/mirror/endeavouros/iso/"
      sums: "{filename}.sha512"
      sig: "{filename}.sig"
      # The index holds EVERY release ever: Gemini, Mercury, Ganymede, Titan...
      # Codenames do not sort. Key max-version on the embedded date or ship Gemini
      # forever.
      match: '^EndeavourOS_[A-Za-z-]+-\d{4}\.\d{2}\.\d{2}\.iso$'
      version_pattern: '(\d{4}\.\d{2}\.\d{2})'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x8F43FC374CD4CEEA19CEE323E3D8752ACDF595A1
        fingerprint: 8F43FC374CD4CEEA19CEE323E3D8752ACDF595A1
        covers: image
    variants:
      default: {label: "EndeavourOS"}
    discover:
      # One ISO per release, named by codename; no edition segment exists. Yields
      # nothing today, would catch `..._Titan-Neo-2026.04.27-lite.iso`.
      match: '\.iso$'
      group: '^EndeavourOS_[A-Za-z_-]+-\d{4}\.\d{2}\.\d{2}-([a-z]+)\.iso$'

  tails:
    strategy: directory_index
    page_url: "https://tails.net/"
    params:
      version_dir: "https://download.tails.net/tails/stable/"
      version_dir_match: '^tails-amd64-[0-9.]+$'
      index: "{version}/"
      # Tails publishes a detached signature and NO checksum file. `verify: gpg`
      # with checksum None -- a signature does not imply a checksum.
      sig: "{filename}.sig"
      match: '^tails-amd64-[0-9.]+\.iso$'
      version_pattern: 'tails-amd64-([0-9.]+)\.iso'
      signing_key:
        url: https://tails.net/tails-signing.key
        fingerprint: A490D0F4D311A4153E2BB7CADBB802B258ACD84F
        covers: image
    variants:
      iso: {label: "Tails"}
    discover:
      match: '\.iso$'
      group: '^tails-amd64-[0-9.]+-([a-z]+)\.iso$'

  batocera:
    strategy: directory_index
    mirror: true    # the official host serves no checksum; this mirror co-locates it
    page_url: "https://batocera.org/"
    params:
      index: "https://mirrors.o2switch.fr/batocera/x86_64/stable/last/"
      # A bare hash with no filename column -- a third checksum format. And the
      # artifact is a gzipped disk image, not an ISO: the enclosure type is derived
      # from the extension, never hardcoded.
      sums: "{filename}.md5"
      match: '^batocera-x86_64-[0-9.]+-\d{8}\.img\.gz$'
      version_pattern: 'batocera-x86_64-([0-9.]+-\d{8})\.img\.gz'
    variants:
      x86_64: {label: "Batocera"}
    discover:
      match: '\.img\.gz$'
      group: '^batocera-x86_64-([a-z]+)-[0-9.]+-\d{8}\.img\.gz$'

  # Proxmox ships PVE, PBS, PMG and PDM ISOs in ONE flat /iso/ dir, every past version
  # co-listed, each with a .iso.sha256, a detached .iso.asc, and a .iso.torrent. One
  # source, gpg-verified off the per-ISO signature, with a trust-on-first-use co-located
  # torrent (the Arch/Ubuntu pattern).
  #
  # `covers: image`, NOT checksums, even though a signed aggregate SHA256SUMS.asc exists:
  # every Proxmox signature (the aggregate AND each .iso.asc) is made by BOTH the Trixie
  # (current, PVE9/PBS4) and Bookworm (legacy) release keys. `gpgv` returns non-zero when
  # any signature in a file is from a key not in the keyring, so checksums-mode -- which
  # gpgv's the whole SHA256SUMS under the single pinned key -- fails on the Bookworm sig
  # it cannot check. image-mode reads only the .iso.asc's issuer (Trixie is listed first),
  # confirming the signature is from the pinned key without gpgv over the file.
  #
  # HTTP, not HTTPS, and deliberately: download.proxmox.com's TLS cert covers only the
  # CDN hosts it redirects to, not the apex. Over http the apex serves files directly
  # with no redirect, so it stays the canonical, geo-balanced, first-party host. The
  # ISO is GPG-signed regardless. This is the one http:// source in the feed.
  proxmox:
    strategy: directory_index
    page_url: "https://www.proxmox.com/en/downloads"
    params:
      index: "http://download.proxmox.com/iso/"
      sums: "SHA256SUMS"            # aggregate; looked up by the resolved filename
      sig: "{filename}.asc"         # detached sig over the ISO -> image-mode gate
      torrent: "{filename}.torrent" # no torrent checksum upstream -> trust-on-first-use
      version_pattern: '_([0-9.]+-[0-9]+)\.iso$'   # 9.2-1 ; the -1 build number stays in the token
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x24B30F06ECC1836A4E5EFECBA7BCD1420BFE778E
        fingerprint: 24B30F06ECC1836A4E5EFECBA7BCD1420BFE778E
        covers: image
    variants:
      # Keys are the upstream product segment (ve, backup-server), NOT pve/pbs: discover's
      # group captures them verbatim, and a key the group cannot produce is reported
      # UNEXPLAINED on every audit run. Labels carry the human names.
      ve: {label: "Proxmox VE", params: {match: '^proxmox-ve_[0-9.]+-[0-9]+\.iso$'}}
      backup-server: {label: "Proxmox Backup Server", params: {match: '^proxmox-backup-server_[0-9.]+-[0-9]+\.iso$'}}
    discover:
      # All four products share the dir; PMG and PDM are separate products not requested,
      # so ignore them (not enumerable:false -- that would hide a fact behind a label).
      # `mail-?gateway` catches both the old `mailgateway` and new `mail-gateway` names.
      # Legacy hex-suffixed ve/pbs names collapse to the same key and lose on version.
      match: '\.iso$'
      group: '^proxmox-([a-z-]+)_'
      ignore: ['mail-?gateway', 'datacenter-manager']

  # ------------------------------------------------------------ stable_symlink (4)
  # Fixed, version-less download URL. The token comes from elsewhere -- either the
  # sidecar's filename column, or a GitHub atom tag.

  kde-neon:
    strategy: stable_symlink
    page_url: "https://neon.kde.org/"
    params:
      sums: "{stem}.sha256sum"    # drops the `.iso`: neon-desktop-current.sha256sum
      sig: "{filename}.sig"
      # The sidecar names `neon-desktop-20260707-0147.iso` while you download
      # `neon-desktop-current.iso`. That mismatch IS the change-token mechanism.
      token: {from: sidecar_filename, pattern: '(\d{8}-\d{4})'}
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xB74EA2162376765BEAC3AE4345F4C354638D1F29
        fingerprint: B74EA2162376765BEAC3AE4345F4C354638D1F29
        covers: image
    variants:
      desktop: {label: "KDE neon User", params: {url: "https://files.kde.org/neon/images/desktop/current/neon-desktop-current.iso"}}
      dev: {label: "KDE neon Testing", params: {url: "https://files.kde.org/neon/images/dev/current/neon-dev-current.iso"}}
    discover:
      # Resolve URL is `images/<ed>/current/neon-<ed>-current.iso`; the EDITIONS are
      # listed one level up. Discovery surface is not the resolve surface.
      # Only children of the index survive enumeration, so KDE's forty site-nav links
      # never reach `group`. What is left is six directories; two are configured.
      #
      #   desk       an unadvertised build dir -- neon.kde.org/download never links it
      #   bigscreen  TV and phone editions. Advertised, but neither publishes a
      #   mobile     `current/` ISO, and neither is x86_64 desktop.
      #   ko         no `current/` ISO
      index: "https://files.kde.org/neon/images/"
      match: '^[a-z]+$'
      group: '^([a-z]+)$'
      ignore: ['^ko$', '^desk$', '^bigscreen$', '^mobile$']

  nixos:
    strategy: stable_symlink
    page_url: "https://nixos.org/download"
    params:
      # channels.nixos.org serves NO index, so the highest channel cannot be listed
      # -- only generated and probed. Distinct from directory_index's version_dir,
      # which reads a real listing.
      probe_versions:
        template: "https://channels.nixos.org/nixos-{version}/latest-nixos-minimal-x86_64-linux.iso.sha256"
      sums: "{filename}.sha256"
      token: {from: sidecar_filename, pattern: '-([0-9.]+\.[0-9a-f]+)-x86_64'}
    variants:
      minimal: {label: "NixOS Minimal", params: {url: "https://channels.nixos.org/nixos-{version}/latest-nixos-minimal-x86_64-linux.iso"}}
      graphical: {label: "NixOS Graphical", params: {url: "https://channels.nixos.org/nixos-{version}/latest-nixos-graphical-x86_64-linux.iso"}}
    discover:
      enumerable: false
      reason: "channels.nixos.org renders its listing client-side; there is no server-side index"

  # The ublue projects: GitHub supplies ONLY the version string. The download URL is
  # fixed on a different host and integrity is a sidecar beside it -- so this is
  # stable_symlink, not github_releases. Each project picks a different arch token,
  # which is why one shared filename convention would be wrong.
  bazzite:
    strategy: stable_symlink
    page_url: "https://bazzite.gg/"
    params:
      sums: "{filename}-CHECKSUM"
      token: {from: atom_tag, repo: "ublue-os/bazzite"}
    variants:
      desktop: {label: "Bazzite Desktop", params: {url: "https://download.bazzite.gg/bazzite-stable-amd64.iso"}}
      deck: {label: "Bazzite Deck", params: {url: "https://download.bazzite.gg/bazzite-deck-stable-amd64.iso"}}
      nvidia-open: {label: "Bazzite NVIDIA Open", params: {url: "https://download.bazzite.gg/bazzite-nvidia-open-stable-amd64.iso"}}
    discover:
      enumerable: false
      reason: "download.bazzite.gg 301s into a Cloudflare cdn-cgi interstitial; no listing"

  bluefin:
    strategy: stable_symlink
    page_url: "https://projectbluefin.io/"
    params:
      sums: "{filename}-CHECKSUM"
      token: {from: atom_tag, repo: "ublue-os/bluefin"}
    variants:
      stable: {label: "Bluefin", params: {url: "https://download.projectbluefin.io/bluefin-stable-x86_64.iso"}}
    discover:
      enumerable: false
      reason: "download.projectbluefin.io returns 404 for its root; no listing"

  aurora:
    strategy: stable_symlink
    page_url: "https://getaurora.dev/"
    params:
      sums: "{filename}-CHECKSUM"
      token: {from: atom_tag, repo: "ublue-os/aurora"}
    variants:
      stable: {label: "Aurora", params: {url: "https://dl.getaurora.dev/aurora-stable-webui-x86_64.iso"}}
      nvidia-open: {label: "Aurora NVIDIA Open", params: {url: "https://dl.getaurora.dev/aurora-nvidia-open-stable-webui-x86_64.iso"}}
    discover:
      # Aurora resolves a fixed URL, but its download host IS a plain index.
      index: "https://dl.getaurora.dev/"
      match: '\.iso$'
      group: '^aurora-(?:(.+)-)?stable-webui-x86_64\.iso$'

  # --------------------------------------------------------------- sourceforge (6)
  # Every RSS <item> appears TWICE, and <title> is a CDATA full path, not a filename.

  mx:
    strategy: sourceforge
    page_url: "https://mxlinux.org/"
    params:
      project: "mx-linux"
      path: "/Final"
      sums: "{path}.sha256"
      sig: "{path}.sig"
      version_pattern: 'MX-([0-9.]+)_'
      ignore: ['_beta\d*_']
    variants:
      xfce: {label: "MX Linux Xfce", params: {match: '/Xfce/MX-[0-9.]+_Xfce_x64\.iso$'}}
      xfce-ahs: {label: "MX Linux Xfce AHS", params: {match: '/Xfce/MX-[0-9.]+_Xfce_ahs_x64\.iso$'}}
      kde: {label: "MX Linux KDE", params: {match: '/KDE/MX-[0-9.]+_KDE_x64\.iso$'}}
      fluxbox: {label: "MX Linux Fluxbox", params: {match: '/Fluxbox/MX-[0-9.]+_fluxbox_x64\.iso$'}}
    discover:
      match: '\.iso$'
      group: 'MX-[0-9.]+_([A-Za-z_]+)_x64\.iso$'

  antix:
    strategy: sourceforge
    page_url: "https://antixlinux.com/"
    params:
      project: "antix-linux"
      path: "/Final"
      sums: "{path}.sha256"
      sig: "{path}.sig"
      version_pattern: 'antiX-([0-9.]+)[-_]'
      # 23.2 sits beside 26 in the same feed, along with a `runit-` subtree and
      # 32-bit `_386` builds. antiX 26 ships only `core` and `full` for x64 --
      # `base` and `net` exist for 23.2 only, so seeding them would pin us backwards.
      ignore: ['_386-', 'runit-', '\.md5$']
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x30AA418A0C723D937B50A986A80582E000067FDD
        fingerprint: 30AA418A0C723D937B50A986A80582E000067FDD
        covers: image
    variants:
      # The release number is NOT hardcoded: `version_pattern` extracts it and
      # `select.newest` picks 26 over the co-listed 23.2. A literal `antiX-26` would
      # freeze the feed at 26 the day 27 ships -- silently, while still resolving.
      full: {label: "antiX Full", params: {match: '/antiX-[0-9.]+/antiX-[0-9.]+_x64-full\.iso$'}}
      core: {label: "antiX Core", params: {match: '/antiX-[0-9.]+/antiX-[0-9.]+_x64-core\.iso$'}}
    discover:
      match: '\.iso$'
      group: '_x64-([a-z]+)\.iso$'
      # 23.2 sits in the same feed and ships editions 26 does not.
      ignore: ['/antiX-2[0-5]', '_386-', 'runit-']

  q4os:
    strategy: sourceforge
    page_url: "https://q4os.org/"
    params:
      project: "q4os"
      path: "/stable"
      # No per-ISO sidecar: ONE aggregate md5sum.txt covering every release, i386
      # and superseded versions included. The filename column is the only
      # disambiguator -- "the first hash" would attach an i386 sum to an x64 ISO.
      sums: "/stable/md5sum.txt"
      version_pattern: 'q4os-([0-9.]+)-'
      ignore: ['i386']
    variants:
      plasma: {label: "Q4OS Plasma", params: {match: '/q4os-[0-9.]+-x64\.r\d+\.iso$'}}
      tde: {label: "Q4OS Trinity", params: {match: '/q4os-[0-9.]+-x64-tde\.r\d+\.iso$'}}
    discover:
      match: '\.iso$'
      group: 'q4os-[0-9.]+-x64-([a-z]+)\.r\d+\.iso$'
      # `instcd` exists only for the superseded 6.6; i386 is another arch.
      ignore: [i386, instcd]

  bluestar:
    strategy: sourceforge
    page_url: "https://bluestarlinux.sourceforge.net/"
    params:
      project: "bluestarlinux"
      path: "/distro"
      sums: "{stem}.md5"      # note: drops the `.iso` -- it is NOT `<name>.iso.md5`
      match: '/bslx-[0-9.-]+-\d{4}\.\d{2}\.\d{2}-x86_64\.iso$'
      version_pattern: 'bslx-([0-9.-]+-\d{4}\.\d{2}\.\d{2})-x86_64'
    variants:
      default: {label: "Bluestar Linux"}
    discover:
      match: '\.iso$'
      group: '^bslx-([a-z]+)-[0-9.-]+-x86_64\.iso$'

  garuda:
    strategy: sourceforge
    page_url: "https://garudalinux.org/downloads"
    params:
      project: "garuda-linux"
      path: "/garuda"
      sums: "{path}.sha256"
      version_pattern: '-(\d{6})\.iso$'
      ignore: ['\.sha1$']     # a co-listed sha1 that must never win over sha256
    variants:
      dr460nized: {label: "Garuda Dr460nized", params: {match: '/dr460nized/\d+/garuda-dr460nized-[a-z-]+-\d+\.iso$'}}
      dr460nized-gaming: {label: "Garuda Dr460nized Gaming", params: {match: '/dr460nized-gaming/\d+/garuda-dr460nized-gaming-[a-z-]+-\d+\.iso$'}}
      gnome: {label: "Garuda GNOME", params: {match: '/gnome/\d+/garuda-gnome-[a-z-]+-\d+\.iso$'}}
      cinnamon: {label: "Garuda Cinnamon", params: {match: '/cinnamon/\d+/garuda-cinnamon-[a-z-]+-\d+\.iso$'}}
      hyprland: {label: "Garuda Hyprland", params: {match: '/hyprland/\d+/garuda-hyprland-[a-z-]+-\d+\.iso$'}}
      i3: {label: "Garuda i3", params: {match: '/i3/\d+/garuda-i3-[a-z-]+-\d+\.iso$'}}
      sway: {label: "Garuda Sway", params: {match: '/sway/\d+/garuda-sway-[a-z-]+-\d+\.iso$'}}
      xfce: {label: "Garuda Xfce", params: {match: '/xfce/\d+/garuda-xfce-[a-z-]+-\d+\.iso$'}}
      kde-lite: {label: "Garuda KDE Lite", params: {match: '/kde-lite/\d+/garuda-kde-lite-[a-z-]+-\d+\.iso$'}}
      mokka: {label: "Garuda Mokka", params: {match: '/mokka/\d+/garuda-mokka-[a-z-]+-\d+\.iso$'}}
    discover:
      group: '^/garuda/([a-z0-9-]+)/'

  cachyos:
    strategy: sourceforge
    page_url: "https://cachyos.org/"
    params:
      project: "cachyos-arch"
      path: "/gui-installer"
      sums: "{path}.sha256"
      sig: "{path}.sig"
      # The directory can disagree with the filename: /handheld/250626/ holds
      # cachyos-handheld-linux-260426.iso. The token comes from the FILENAME.
      version_pattern: '-(\d{6})\.iso$'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x882DCFE48E2051D48E2562ABF3B607488DB35A47
        fingerprint: 882DCFE48E2051D48E2562ABF3B607488DB35A47
        covers: image
    variants:
      desktop: {label: "CachyOS Desktop", params: {match: '/desktop/\d+/cachyos-desktop-linux-\d+\.iso$'}}
      handheld: {label: "CachyOS Handheld", params: {match: '/handheld/\d+/cachyos-handheld-linux-\d+\.iso$'}}
    discover:
      group: '^/gui-installer/([a-z0-9-]+)/'

  # ----------------------------------------------------------- github_releases (2)
  # GitHub *assets*. The ublue projects are NOT here; they only borrow a version tag.

  anduinos:
    strategy: github_releases
    page_url: "https://www.anduinos.com/"
    params:
      # Every release asset is a `.torrent` -- 22 of them, one per locale, and no
      # ISO anywhere. The torrent names the ISO it serves (`AnduinOS-1.4.2-en_US.iso`).
      #
      # Nothing signs the torrent and no checksum is published, so `verify` is
      # `torrent`: the infohash covers every piece, but only on trust-on-first-use.
      # The tracker is a public one (opentrackr.org), not first-party.
      repo: "Anduin2017/AnduinOS"
      version_pattern: 'AnduinOS-([0-9.]+)-'
    variants:
      # `variant_key` lowercases and maps `_` to `-`, so the config key is `en-us`
      # while the artifact is `en_US`. Naming it `en_US` makes the audit report
      # `en-us` as UNEXPLAINED on every run, forever.
      en-us: {label: "AnduinOS", params: {torrent_only: true, match: '^AnduinOS-[0-9.]+-en_US\.torrent$'}}
    discover:
      # 21 locale builds of the same release, not editions. One lookahead beats a
      # 21-entry list; `ignore` is compiled with re.IGNORECASE.
      match: '\.torrent$'
      group: '^AnduinOS-[0-9.]+-([a-z]{2}_[A-Z]{2})\.torrent$'
      ignore: ['-(?!en_US)[a-z]{2}_[A-Z]{2}\.torrent$']

  minios:
    strategy: github_releases
    page_url: "https://minios.dev/"
    params:
      repo: "minios-linux/minios-live"
      sums_suffix: ".sha256"
      version_pattern: '-([0-9.]+)\.iso$'
    variants:
      standard: {label: "MiniOS Standard", params: {match: '^minios-\w+-xfce-standard-amd64-[0-9.]+\.iso$'}}
      toolbox: {label: "MiniOS Toolbox", params: {match: '^minios-\w+-xfce-toolbox-amd64-[0-9.]+\.iso$'}}
      ultra: {label: "MiniOS Ultra", params: {match: '^minios-\w+-xfce-ultra-amd64-[0-9.]+\.iso$'}}
    discover:
      group: '^minios-\w+-xfce-([a-z]+)-amd64-'

  # ---------------------------------------------------------------- page_index (2)
  # The last resort. Only the LISTING step is fragile; everything downstream is the
  # same pipeline every other strategy uses.

  nobara:
    strategy: page_index
    page_url: "https://nobaraproject.org/"
    params:
      url: "https://nobaraproject.org/download-nobara/"
      attr: "data-url"        # stabler than href markup; the page exposes it directly
      # `.sha256` 404s. The real suffix is `.sha256sum`, which only the page's own
      # script.js reveals. Its filename column reads `./Nobara-...iso` -- the leading
      # `./` is normalized away, or every lookup misses and the entry looks unsigned.
      sums: "{filename}.sha256sum"
      version_pattern: 'Nobara-(\d+)-[A-Za-z-]+-(\d{4}-\d{2}-\d{2})\.iso$'
    variants:
      gnome: {label: "Nobara GNOME", params: {match: '^Nobara-\d+-GNOME-\d{4}-\d{2}-\d{2}\.iso$'}}
      gnome-nv: {label: "Nobara GNOME (NVIDIA)", params: {match: '^Nobara-\d+-GNOME-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      kde: {label: "Nobara KDE", params: {match: '^Nobara-\d+-KDE-\d{4}-\d{2}-\d{2}\.iso$'}}
      kde-nv: {label: "Nobara KDE (NVIDIA)", params: {match: '^Nobara-\d+-KDE-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      official: {label: "Nobara Official", params: {match: '^Nobara-\d+-Official-\d{4}-\d{2}-\d{2}\.iso$'}}
      official-nv: {label: "Nobara Official (NVIDIA)", params: {match: '^Nobara-\d+-Official-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      steam-htpc: {label: "Nobara Steam HTPC", params: {match: '^Nobara-\d+-Steam-HTPC-\d{4}-\d{2}-\d{2}\.iso$'}}
      steam-htpc-nv: {label: "Nobara Steam HTPC (NVIDIA)", params: {match: '^Nobara-\d+-Steam-HTPC-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      steam-handheld: {label: "Nobara Steam Handheld", params: {match: '^Nobara-\d+-Steam-Handheld-\d{4}-\d{2}-\d{2}\.iso$'}}
    discover:
      # The page is the only surface Nobara has, so enumerate it: a new edition here
      # is otherwise invisible until someone notices. (Official / Steam-HTPC /
      # Steam-Handheld all existed on day one and were missed for exactly that reason.)
      match: '\.iso$'
      group: '^Nobara-\d+-(.+?)-\d{4}-\d{2}-\d{2}\.iso$'

  manjaro:
    strategy: page_index
    page_url: "https://manjaro.org/"
    params:
      # /download/ is a 95-byte <meta refresh> stub; curl -L does not follow HTML
      # refreshes, which makes it look like an empty JS page. This is the real page.
      # Manjaro's SourceForge project is a trap: every ISO there is a `-pre` build.
      url: "https://manjaro.org/products/download/x86"
      sums: "{filename}.sha256"
      sig: "{filename}.sig"
      # Manjaro can co-publish kernel builds (linux612 / linux618 / linux70) of one
      # release. The kernel belongs in the TOKEN -- a different kernel is different
      # bytes, so it must be a different guid -- but it must not ORDER the
      # candidates: as integers 618 > 70, while as kernels 7.0 > 6.18. So sort on
      # release + build date and let the name tie-break, where linux70 > linux618.
      version_pattern: '-([0-9.]+-\d{6}-linux\d+)\.iso$'
      sort_pattern: '-([0-9.]+-\d{6})-linux\d+\.iso$'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3B794DE6D4320FCE594F4171279E7CF5D8D56EC8
        fingerprint: 3B794DE6D4320FCE594F4171279E7CF5D8D56EC8
        covers: image
    variants:
      kde: {label: "Manjaro KDE Plasma", params: {match: '^manjaro-kde-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      gnome: {label: "Manjaro GNOME", params: {match: '^manjaro-gnome-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      xfce: {label: "Manjaro Xfce", params: {match: '^manjaro-xfce-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      cinnamon: {label: "Manjaro Cinnamon", params: {match: '^manjaro-cinnamon-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      i3: {label: "Manjaro i3", params: {match: '^manjaro-i3-[0-9.]+-\d{6}-linux\d+\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^manjaro-([a-z0-9]+)-'
