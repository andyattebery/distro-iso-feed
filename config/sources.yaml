      index: "{version}/release/"
      sums: "SHA256SUMS"
      sig: "SHA256SUMS.gpg"
      version_pattern: 'ubuntucinnamon-([0-9.]+)-'
      torrent: "{filename}.torrent"
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x843938DF228D22F7B3742BC0D94AA3F0EFE21092
        fingerprint: 843938DF228D22F7B3742BC0D94AA3F0EFE21092
        covers: checksums
    variants:
      desktop-lts: {label: "Ubuntu Cinnamon LTS", params: {channel: lts, match: '^ubuntucinnamon-[0-9.]+-desktop-amd64\.iso$'}}
      desktop-latest: {label: "Ubuntu Cinnamon latest", params: {channel: latest, match: '^ubuntucinnamon-[0-9.]+-desktop-amd64\.iso$'}}
    discover:
      enumerable: false
      reason: "variant keys carry an LTS/latest channel that no artifact filename encodes"

  freebsd:
    strategy: directory_index
    page_url: "https://www.freebsd.org/where/"
    params:
      version_dir: "https://download.freebsd.org/releases/amd64/amd64/ISO-IMAGES/"
      index: "{version}/"
      # BSD-format checksum file, and its NAME embeds the version. A literal `sums`
      # cannot express this; a GNU-only parser reads zero lines from it.
      sums: "CHECKSUM.SHA256-FreeBSD-{version}-RELEASE-{token}"
      version_pattern: 'FreeBSD-([0-9.]+)-RELEASE'
      ignore: ['\.iso\.xz$']
    variants:
      # Multi-arch: arm64 ISOs live on a different tree (`.../arm64/aarch64/ISO-IMAGES/`) and both
      # their filename and their checksum file spell the arch `arm64-aarch64`, so a single `{token}`
      # covers `match` and `sums` and only `version_dir` is overridden. Hand-seeded because arch
      # discovery only sees the amd64 tree; it proposes nothing here.
      disc1: {label: "FreeBSD disc1", arches: {x86_64: amd64, aarch64: {token: arm64-aarch64, version_dir: "https://download.freebsd.org/releases/arm64/aarch64/ISO-IMAGES/"}}, params: {match: '^FreeBSD-[0-9.]+-RELEASE-{token}-disc1\.iso$'}}
      dvd1: {label: "FreeBSD dvd1", arches: {x86_64: amd64, aarch64: {token: arm64-aarch64, version_dir: "https://download.freebsd.org/releases/arm64/aarch64/ISO-IMAGES/"}}, params: {match: '^FreeBSD-[0-9.]+-RELEASE-{token}-dvd1\.iso$'}}
      bootonly: {label: "FreeBSD bootonly", arches: {x86_64: amd64, aarch64: {token: arm64-aarch64, version_dir: "https://download.freebsd.org/releases/arm64/aarch64/ISO-IMAGES/"}}, params: {match: '^FreeBSD-[0-9.]+-RELEASE-{token}-bootonly\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^FreeBSD-[0-9.]+-RELEASE-amd64-([a-z0-9]+)\.iso$'
      ignore: ['\.iso\.xz$']

  # OpenBSD. Checksums-only: `SHA256.sig` is a signify signature, not GPG, so the feed's gpg
  # gate cannot verify it -- the HTTPS-served BSD-format `SHA256` is the integrity anchor. The
  # arch is a PATH segment (`7.9/amd64/`, `7.9/arm64/`), and the filename (`install79.iso`)
  # carries no dotted version, so the version comes from the directory name (no version_pattern).
  openbsd:
    strategy: directory_index
    page_url: "https://www.openbsd.org/faq/faq4.html"
    params:
      version_dir: "https://cdn.openbsd.org/pub/OpenBSD/"
      version_dir_match: '^\d+\.\d+$'
      index: "{version}/{token}/"
      sums: "SHA256"
    variants:
      # `install` is the full image, `cd` the network-install CD. The filename is identical
      # across arches (arch is the path), so `match` carries no {token}.
      install: {label: "OpenBSD install", arches: {x86_64: amd64, aarch64: arm64}, params: {match: '^install\d+\.iso$'}}
      cd: {label: "OpenBSD CD", arches: {x86_64: amd64, aarch64: arm64}, params: {match: '^cd\d+\.iso$'}}
    discover:
      # Editions are `install`/`cd`; the key MUST equal the group capture -- `cd`, not `cdrom`.
      # The other CPU platforms are arches, not editions; arch_ignore keeps amd64+arm64 sticky.
      match: '\.iso$'
      group: '^([a-z]+)\d+\.iso$'
      arch_ignore: [alpha, armv7, hppa, i386, landisk, loongson, luna88k, macppc, octeon, powerpc64, riscv64, sparc64]

  # NetBSD. Checksums-only (BSD-format `SHA512`, no GPG). One install ISO per CPU port, all in
  # the same `images/` dir, so the arch is a FILENAME token -- amd64, and aarch64 spelled
  # `evbarm-aarch64` (the same double-spelling shape as FreeBSD). This is the widest arch fan-out
  # in the catalog (~50 ports): amd64+aarch64 are seeded and every other port is arch_ignored so
  # the weekly discovery stays quiet. (The `{token}` capture excludes hyphenated ports, so only
  # the hyphenless ones can be proposed -- those are the ones listed below.)
  netbsd:
    strategy: directory_index
    page_url: "https://www.netbsd.org/releases/formal.html"
    params:
      version_dir: "https://cdn.netbsd.org/pub/NetBSD/"
      version_dir_match: '^NetBSD-[0-9.]+$'
      index: "{version}/images/"
      sums: "SHA512"
      version_pattern: 'NetBSD-([0-9.]+)-'
      torrent: "{filename}.torrent"
    variants:
      install: {label: "NetBSD install", arches: {x86_64: amd64, aarch64: evbarm-aarch64}, params: {match: '^NetBSD-[0-9.]+-{token}\.iso$'}}
    discover:
      enumerable: false
      reason: "one install ISO per architecture; the ~50 CPU ports are arches, not editions"
      arch_ignore: [acorn32, alpha, amiga, arc, atari, cats, cobalt, dreamcast, emips, evbppc, ews4800mips, hp300, hpcarm, hpcmips, hpcsh, hppa, i386, ia64, ibmnws, luna68k, mac68k, macppc, mipsco, mvme68k, mvmeppc, news68k, newsmips, next68k, ofppc, pmax, prep, sandpoint, sgimips, shark, sparc, sparc64, sun2, sun3, vax, x68k, zaurus]

  # openSUSE is ONE distro whose variants override `strategy:`. Leap lists a version
  # directory; Tumbleweed is a fixed `*-Current.iso`. Splitting it into two fake
  # distros would be an artifact of the config rule, not of reality.
  opensuse:
    strategy: directory_index
    page_url: "https://get.opensuse.org/"
    params:
      # `leap/` also lists a legacy `42.3`, which outsorts `16.1` numerically.
      version_dir: "https://download.opensuse.org/distribution/leap/"
      version_dir_match: '^1[5-9]\.\d+$'
      # Only 15.6 exposes an `iso/` subdir today; 16.x has none. The probe takes the
      # highest dir that actually *contains* an artifact, so 16.x is picked up free
      # whenever it appears.
      index: "{version}/iso/"
      # `-Current.iso` exists but is NOT linked in the index, so directory_index
      # cannot see it. The listed `Build710.3-Media.iso` is the real artifact, and
      # its build number is a genuine change-token.
      sums: "{filename}.sha256"
      # Every openSUSE artifact ships `.sha256` + `.sha256.asc` side by side, so the signature
      # belongs here beside `sums` rather than per-variant. Leap had the `signing_key` but no
      # `sig`, which made the pin inert -- `verify_signing_key` bails without a signature_url,
      # so all 8 leap variants served `verify: checksum` while the config implied `gpg`.
      sig: "{filename}.sha256.asc"
      version_pattern: 'Leap-([0-9.]+)-\w+-{token}-Build([0-9.]+)-Media'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xAD485664E901B867051AB15F35A2F86E29B700A4
        fingerprint: AD485664E901B867051AB15F35A2F86E29B700A4
        covers: checksums
    variants:
      # Multi-arch: filename token (Leap ships x86_64/aarch64/ppc64le/s390x in one `iso/` dir).
      # `arches` seeds x86_64; discovery fills the rest -- trim ppc64le/s390x in review if unwanted.
      leap-dvd: {label: "openSUSE Leap DVD", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x}, params: {match: '^openSUSE-Leap-[0-9.]+-DVD-{token}-Build[0-9.]+-Media\.iso$'}}
      leap-net: {label: "openSUSE Leap NET", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x}, params: {match: '^openSUSE-Leap-[0-9.]+-NET-{token}-Build[0-9.]+-Media\.iso$'}}
      tumbleweed-dvd:
        label: "openSUSE Tumbleweed DVD"
        strategy: stable_symlink
        # aarch64 lives under a separate `/ports/` tree, so its full URL is overridden by hand
        # (no `{token}` -- the x86_64 URL keeps its literal spelling and discovery can't reach ports).
        arches: {x86_64: x86_64, aarch64: {url: "https://download.opensuse.org/ports/aarch64/tumbleweed/iso/openSUSE-Tumbleweed-DVD-aarch64-Current.iso"}}
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-DVD-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
          # The `.torrent` sits beside the `-Current.iso` symlink but names the dated
          # snapshot inside it. `attach_torrent` ties them by `version in info.name`
          # (version is `Snapshot<date>`), not by filename equality. No checksum for
          # the torrent; the ISO stays GPG-signed.
          torrent: "{filename}.torrent"
      tumbleweed-net:
        label: "openSUSE Tumbleweed NET"
        strategy: stable_symlink
        arches: {x86_64: x86_64, aarch64: {url: "https://download.opensuse.org/ports/aarch64/tumbleweed/iso/openSUSE-Tumbleweed-NET-aarch64-Current.iso"}}
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-NET-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
          torrent: "{filename}.torrent"
      microos-dvd:
        # The immutable/atomic sibling of Tumbleweed -- same fixed `-Current.iso` shape and
        # `Snapshot<date>` token. aarch64 lives under `/ports/` like the others. No `.torrent`
        # is published beside the MicroOS image (verified 404), so it is omitted.
        label: "openSUSE MicroOS DVD"
        strategy: stable_symlink
        arches: {x86_64: x86_64, aarch64: {url: "https://download.opensuse.org/ports/aarch64/tumbleweed/iso/openSUSE-MicroOS-DVD-aarch64-Current.iso"}}
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-MicroOS-DVD-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
      # Tumbleweed live spins -- same fixed `-Current.iso` shape as tumbleweed-dvd, aarch64 on
      # `/ports/`, no torrent. `discover` (below) enumerates `/tumbleweed/iso/` via `extra_index`,
      # so a future spin surfaces automatically.
      tumbleweed-gnome-live:
        label: "openSUSE Tumbleweed GNOME Live"
        strategy: stable_symlink
        arches: {x86_64: x86_64, aarch64: {url: "https://download.opensuse.org/ports/aarch64/tumbleweed/iso/openSUSE-Tumbleweed-GNOME-Live-aarch64-Current.iso"}}
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-GNOME-Live-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
      tumbleweed-kde-live:
        label: "openSUSE Tumbleweed KDE Live"
        strategy: stable_symlink
        arches: {x86_64: x86_64, aarch64: {url: "https://download.opensuse.org/ports/aarch64/tumbleweed/iso/openSUSE-Tumbleweed-KDE-Live-aarch64-Current.iso"}}
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-KDE-Live-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
      tumbleweed-xfce-live:
        label: "openSUSE Tumbleweed XFCE Live"
        strategy: stable_symlink
        arches: {x86_64: x86_64, aarch64: {url: "https://download.opensuse.org/ports/aarch64/tumbleweed/iso/openSUSE-Tumbleweed-XFCE-Live-aarch64-Current.iso"}}
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-XFCE-Live-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
      tumbleweed-rescue-cd:
        label: "openSUSE Tumbleweed Rescue CD"
        strategy: stable_symlink
        arches: {x86_64: x86_64, aarch64: {url: "https://download.opensuse.org/ports/aarch64/tumbleweed/iso/openSUSE-Tumbleweed-Rescue-CD-aarch64-Current.iso"}}
        params:
          url: "https://download.opensuse.org/tumbleweed/iso/openSUSE-Tumbleweed-Rescue-CD-x86_64-Current.iso"
          sums: "{filename}.sha256"
          sig: "{filename}.sha256.asc"
          token: {from: sidecar_filename, pattern: '(Snapshot\d{8})'}
    discover:
      # Two enumeration surfaces: the Leap version-dir listing (via the leap variants) AND the
      # static Tumbleweed/MicroOS `/tumbleweed/iso/` index (via `extra_index`, since the fixed-URL
      # stable_symlink variants list nothing). The group captures family + edition across both --
      # `Leap`+`DVD` -> leap-dvd, `Tumbleweed`+`GNOME-Live` -> tumbleweed-gnome-live -- so a new
      # spin in either surface is proposed. The `Snapshot`-dated and non-x86_64 files never match.
      extra_index: "https://download.opensuse.org/tumbleweed/iso/"
      match: '\.iso$'
      group: '^openSUSE-(Leap|Tumbleweed|MicroOS)-(?:[0-9.]+-)?(.+?)-x86_64-(?:Build[0-9.]+-Media|Current)\.iso$'
      ignore: [aarch64, ppc64le, s390x]

  endeavouros:
    strategy: directory_index
    mirror: true    # EndeavourOS publishes no first-party download host at all
    page_url: "https://endeavouros.com/"
    params:
      index: "https://ftp.belnet.be/mirror/endeavouros/iso/"
      sums: "{filename}.sha512"
      sig: "{filename}.sig"
      # The index holds EVERY release ever: Gemini, Mercury, Ganymede, Titan...
      # Codenames do not sort. Key max-version on the embedded date or ship Gemini
      # forever.
      match: '^EndeavourOS_[A-Za-z-]+-\d{4}\.\d{2}\.\d{2}\.iso$'
      version_pattern: '(\d{4}\.\d{2}\.\d{2})'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x8F43FC374CD4CEEA19CEE323E3D8752ACDF595A1
        fingerprint: 8F43FC374CD4CEEA19CEE323E3D8752ACDF595A1
        covers: image
    variants:
      default: {label: "EndeavourOS"}
    discover:
      # One ISO per release, named by codename; no edition segment exists. Yields
      # nothing today, would catch `..._Titan-Neo-2026.04.27-lite.iso`.
      match: '\.iso$'
      group: '^EndeavourOS_[A-Za-z_-]+-\d{4}\.\d{2}\.\d{2}-([a-z]+)\.iso$'

  tails:
    strategy: directory_index
    page_url: "https://tails.net/"
    params:
      version_dir: "https://download.tails.net/tails/stable/"
      version_dir_match: '^tails-amd64-[0-9.]+$'
      index: "{version}/"
      # Tails publishes a detached signature and NO checksum file. `verify: gpg`
      # with checksum None -- a signature does not imply a checksum.
      sig: "{filename}.sig"
      match: '^tails-amd64-[0-9.]+\.iso$'
      version_pattern: 'tails-amd64-([0-9.]+)\.iso'
      signing_key:
        url: https://tails.net/tails-signing.key
        fingerprint: A490D0F4D311A4153E2BB7CADBB802B258ACD84F
        covers: image
    variants:
      iso: {label: "Tails"}
    discover:
      match: '\.iso$'
      group: '^tails-amd64-[0-9.]+-([a-z]+)\.iso$'

  batocera:
    strategy: directory_index
    mirror: true    # the official host serves no checksum; this mirror co-locates it
    page_url: "https://batocera.org/"
    params:
      index: "https://mirrors.o2switch.fr/batocera/x86_64/stable/last/"
      # A bare hash with no filename column -- a third checksum format. And the
      # artifact is a gzipped disk image, not an ISO: the enclosure type is derived
      # from the extension, never hardcoded.
      sums: "{filename}.md5"
      match: '^batocera-x86_64-[0-9.]+-\d{8}\.img\.gz$'
      version_pattern: 'batocera-x86_64-([0-9.]+-\d{8})\.img\.gz'
    variants:
      x86_64: {label: "Batocera"}
    discover:
      match: '\.img\.gz$'
      group: '^batocera-x86_64-([a-z]+)-[0-9.]+-\d{8}\.img\.gz$'

  # Proxmox ships PVE, PBS, PMG and PDM ISOs in ONE flat /iso/ dir, every past version
  # co-listed, each with a .iso.sha256, a detached .iso.asc, and a .iso.torrent. One
  # source, gpg-verified off the per-ISO signature, with a trust-on-first-use co-located
  # torrent (the Arch/Ubuntu pattern).
  #
  # `covers: image`, NOT checksums, even though a signed aggregate SHA256SUMS.asc exists:
  # every Proxmox signature (the aggregate AND each .iso.asc) is made by BOTH the Trixie
  # (current, PVE9/PBS4) and Bookworm (legacy) release keys. `gpgv` returns non-zero when
  # any signature in a file is from a key not in the keyring, so checksums-mode -- which
  # gpgv's the whole SHA256SUMS under the single pinned key -- fails on the Bookworm sig
  # it cannot check. image-mode reads only the .iso.asc's issuer (Trixie is listed first),
  # confirming the signature is from the pinned key without gpgv over the file.
  #
  # HTTP, not HTTPS, and deliberately: download.proxmox.com's TLS cert covers only the
  # CDN hosts it redirects to, not the apex. Over http the apex serves files directly
  # with no redirect, so it stays the canonical, geo-balanced, first-party host. The
  # ISO is GPG-signed regardless. This is the one http:// source in the feed.
  proxmox:
    strategy: directory_index
    page_url: "https://www.proxmox.com/en/downloads"
    params:
      index: "http://download.proxmox.com/iso/"
      sums: "SHA256SUMS"            # aggregate; looked up by the resolved filename
      sig: "{filename}.asc"         # detached sig over the ISO -> image-mode gate
      torrent: "{filename}.torrent" # no torrent checksum upstream -> trust-on-first-use
      version_pattern: '_([0-9.]+-[0-9]+)\.iso$'   # 9.2-1 ; the -1 build number stays in the token
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x24B30F06ECC1836A4E5EFECBA7BCD1420BFE778E
        fingerprint: 24B30F06ECC1836A4E5EFECBA7BCD1420BFE778E
        covers: image
    variants:
      # Keys are the upstream product segment (ve, backup-server), NOT pve/pbs: discover's
      # group captures them verbatim, and a key the group cannot produce is reported
      # UNEXPLAINED on every audit run. Labels carry the human names.
      ve: {label: "Proxmox VE", params: {match: '^proxmox-ve_[0-9.]+-[0-9]+\.iso$'}}
      backup-server: {label: "Proxmox Backup Server", params: {match: '^proxmox-backup-server_[0-9.]+-[0-9]+\.iso$'}}
      # `mail-?gateway` matches both spellings; max-version picks the current hyphenated
      # `proxmox-mail-gateway_9.x` over the legacy `proxmox-mailgateway_7.x`.
      mail-gateway: {label: "Proxmox Mail Gateway", params: {match: '^proxmox-mail-?gateway_[0-9.]+-[0-9]+\.iso$'}}
      datacenter-manager: {label: "Proxmox Datacenter Manager", params: {match: '^proxmox-datacenter-manager_[0-9.]+-[0-9]+\.iso$'}}
    discover:
      # All four products share the dir and are now configured. The group captures the product
      # segment; the only unconfigured key it can still produce is the legacy hyphenless
      # `mailgateway` (old PMG names), so that one stays ignored -- `mailgateway` is not a
      # substring of `mail-gateway`, so the current product is untouched.
      # Legacy hex-suffixed ve/pbs names collapse to the same key and lose on version.
      match: '\.iso$'
      group: '^proxmox-([a-z-]+)_'
      ignore: ['mailgateway']

  # Rocky Linux -- a RHEL rebuild. One ISO dir per major; the bare `10/` is a symlink that
  # tracks the newest point release, so version_dir on bare majors auto-adopts it. CHECKSUM
  # is plain BSD-format with a detached CHECKSUM.asc beside it -- the Debian/Kali gpg pattern.
  # Rocky signs per-MAJOR (RPM-GPG-KEY-Rocky-10); the pin is for 10. When 11 ships signed by a
  # new key the gate can't verify it -> that entry degrades to `checksum` and audit --strict
  # flags it (no silent wrong pin). The `-latest-` symlinks carry the same hashes and no
  # point-release token; the anchored match (digits where they put `latest`) excludes them.
  rocky:
    strategy: directory_index
    page_url: "https://rockylinux.org/download"
    params:
      version_dir: "https://download.rockylinux.org/pub/rocky/"
      version_dir_match: '^\d+$'
      index: "{version}/isos/{token}/"
      sums: "CHECKSUM"
      sig: "CHECKSUM.asc"
      version_pattern: 'Rocky-([0-9.]+)-{token}'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xFC226859C0860BF0DDB95B085B106C736FEDFC85
        fingerprint: FC226859C0860BF0DDB95B085B106C736FEDFC85
        covers: checksums
    variants:
      # Multi-arch: each arch has its own `isos/{arch}/` dir with its own CHECKSUM (same per-major
      # key). `arches` seeds x86_64; discovery fills aarch64 (+ppc64le/s390x). Rocky 10 names the
      # DVD `dvd1`, Rocky 9 `dvd` -- `dvd1?` covers both.
      boot: {label: "Rocky Linux boot", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, riscv64: riscv64, s390x: s390x}, params: {match: '^Rocky-[0-9.]+-{token}-boot\.iso$'}}
      minimal: {label: "Rocky Linux minimal", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, riscv64: riscv64, s390x: s390x}, params: {match: '^Rocky-[0-9.]+-{token}-minimal\.iso$'}}
      dvd: {label: "Rocky Linux DVD", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, riscv64: riscv64, s390x: s390x}, params: {match: '^Rocky-[0-9.]+-{token}-dvd1?\.iso$'}}
    discover:
      # Variant discovery stays x86_64-anchored (it finds editions, not arches -- arch_tokens does
      # arches). `([a-z]+)1?` absorbs the `1` in `dvd1` so the key is `dvd`, not UNEXPLAINED `dvd1`.
      match: '\.iso$'
      group: '^Rocky-[0-9.]+-x86_64-([a-z]+)1?\.iso$'

  # CentOS Stream -- the rolling RHEL upstream. Version dirs are `9-stream`/`10-stream`. The
  # iso dir carries dated composes AND `-latest-` symlinks; the DATED name is the change-token
  # (rolling -- re-notifies each compose, like Tumbleweed), and the anchored match excludes the
  # tokenless `-latest-` decoys. Per-ISO `.SHA256SUM` sidecar (BSD format); no signature is
  # published for the ISOs, so verify: checksum.
  centos:
    strategy: directory_index
    page_url: "https://www.centos.org/download/"
    params:
      version_dir: "https://mirror.stream.centos.org/"
      version_dir_match: '^\d+-stream$'
      index: "{version}/BaseOS/{token}/iso/"
      sums: "{filename}.SHA256SUM"
      version_pattern: 'CentOS-Stream-\d+-(\d{8}\.\d+)-{token}'
    variants:
      # Multi-arch: each `BaseOS/{arch}/iso/` holds its own dated compose + per-ISO .SHA256SUM.
      boot: {label: "CentOS Stream boot", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x}, params: {match: '^CentOS-Stream-\d+-\d{8}\.\d+-{token}-boot\.iso$'}}
      dvd: {label: "CentOS Stream DVD", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x}, params: {match: '^CentOS-Stream-\d+-\d{8}\.\d+-{token}-dvd1?\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^CentOS-Stream-\d+-\d{8}\.\d+-x86_64-([a-z]+)1?\.iso$'

  # AlmaLinux -- a RHEL rebuild, same shape as Rocky (versioned ISO dir per major; bare `10/`
  # tracks the newest point release). The difference: AlmaLinux CLEARSIGNS its CHECKSUM inline
  # -- there is no detached `.asc` (it 404s) -- so `covers: clearsigned` (gpg --verify the whole
  # file under the pinned key, then read the checksum from the verified body). Per-MAJOR key
  # (RPM-GPG-KEY-AlmaLinux-10); same self-healing degrade-and-flag as Rocky on a new major.
  # AlmaLinux names the DVD `dvd` (no `1`), unlike Rocky. `-latest-` decoys excluded by the anchor.
  almalinux:
    strategy: directory_index
    page_url: "https://almalinux.org/get-almalinux/"
    params:
      version_dir: "https://repo.almalinux.org/almalinux/"
      version_dir_match: '^\d+$'
      index: "{version}/isos/{token}/"
      sums: "CHECKSUM"
      sig: "CHECKSUM"     # the clearsigned CHECKSUM is its own signature
      version_pattern: 'AlmaLinux-([0-9.]+)-{token}'
      signing_key:
        url: https://repo.almalinux.org/almalinux/RPM-GPG-KEY-AlmaLinux-10
        fingerprint: EE6DB7B98F5BF5EDD9DA0DE5DEE5C11CC2A1E572
        covers: clearsigned
    variants:
      # Multi-arch: each `isos/{arch}/` dir carries its own clearsigned CHECKSUM (same per-major
      # key). `arches` seeds x86_64; discovery fills aarch64/ppc64le/s390x.
      boot: {label: "AlmaLinux boot", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x, x86_64_v2: x86_64_v2}, params: {match: '^AlmaLinux-[0-9.]+-{token}-boot\.iso$'}}
      minimal: {label: "AlmaLinux minimal", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x, x86_64_v2: x86_64_v2}, params: {match: '^AlmaLinux-[0-9.]+-{token}-minimal\.iso$'}}
      dvd: {label: "AlmaLinux DVD", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x, x86_64_v2: x86_64_v2}, params: {match: '^AlmaLinux-[0-9.]+-{token}-dvd\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^AlmaLinux-[0-9.]+-x86_64-([a-z]+)\.iso$'

  # OPNsense -- a FreeBSD firewall. Images are bzip2-compressed (the DVD is `.iso.bz2`, the
  # USB images `.img.bz2`); no first-party autoindex, so a mirror. The `.r` suffix marks a
  # RELEASE CANDIDATE (`OPNsense-26.7.r1-…` while 26.7 is in RC) -- stable files have no `.r`
  # (`OPNsense-26.1.6-…`) -- so the match rejects `.r`. The newest version dir can be RC-only
  # (`26.7/` during the RC window); directory_index skips a dir with no stable-matching artifact
  # and falls to the newest stable (26.1.6). Point releases live in a series dir whose name
  # differs from the file token (`26.1/` holds `OPNsense-26.1.6-…`), so `sums_from_filename`
  # builds the checksums URL from the file token, not the dir. OPNsense signs with an OpenSSL
  # RSA key, not OpenPGP, which the gpg gate can't consume -> verify: checksum.
  opnsense:
    strategy: directory_index
    mirror: true    # no first-party download autoindex; the release mirrors carry one
    page_url: "https://opnsense.org/download/"
    params:
      version_dir: "https://mirror.ams1.nl.leaseweb.net/opnsense/releases/"
      index: "{version}/"
      sums: "OPNsense-{version}-checksums-amd64.sha256"
      sums_from_filename: true   # {version} = the FILENAME token (26.1.6), not the dir (26.1)
      match: '^OPNsense-[0-9.]+-dvd-amd64\.iso\.bz2$'
      version_pattern: 'OPNsense-([0-9.]+)-dvd-amd64'
    variants:
      dvd: {label: "OPNsense DVD"}
    discover:
      # Only the DVD `.iso.bz2` is tracked; the `-nano-/-serial-/-vga-` `.img.bz2` USB images
      # are excluded by the discover match, so the group yields only `dvd`.
      match: '\.iso\.bz2$'
      group: '^OPNsense-[0-9.]+-([a-z]+)-amd64\.iso\.bz2$'

  # ------------------------------------------------------------ stable_symlink (5)
  # Fixed, version-less download URL. The token comes from elsewhere -- either the
  # sidecar's filename column, or a GitHub atom tag.

  kde-neon:
    strategy: stable_symlink
    page_url: "https://neon.kde.org/"
    params:
      sums: "{stem}.sha256sum"    # drops the `.iso`: neon-desktop-current.sha256sum
      sig: "{filename}.sig"
      # The sidecar names `neon-desktop-20260707-0147.iso` while you download
      # `neon-desktop-current.iso`. That mismatch IS the change-token mechanism.
      token: {from: sidecar_filename, pattern: '(\d{8}-\d{4})'}
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xB74EA2162376765BEAC3AE4345F4C354638D1F29
        fingerprint: B74EA2162376765BEAC3AE4345F4C354638D1F29
        covers: image
    variants:
      desktop: {label: "KDE neon User", params: {url: "https://files.kde.org/neon/images/desktop/current/neon-desktop-current.iso"}}
      dev: {label: "KDE neon Testing", params: {url: "https://files.kde.org/neon/images/dev/current/neon-dev-current.iso"}}
    discover:
      # Resolve URL is `images/<ed>/current/neon-<ed>-current.iso`; the EDITIONS are
      # listed one level up. Discovery surface is not the resolve surface.
      # Only children of the index survive enumeration, so KDE's forty site-nav links
      # never reach `group`. What is left is six directories; two are configured.
      #
      #   desk       an unadvertised build dir -- neon.kde.org/download never links it
      #   bigscreen  TV and phone editions. Advertised, but neither publishes a
      #   mobile     `current/` ISO, and neither is x86_64 desktop.
      #   ko         no `current/` ISO
      index: "https://files.kde.org/neon/images/"
      match: '^[a-z]+$'
      group: '^([a-z]+)$'
      ignore: ['^ko$', '^desk$', '^bigscreen$', '^mobile$']

  nixos:
    strategy: stable_symlink
    page_url: "https://nixos.org/download"
    params:
      # channels.nixos.org serves NO index, so the highest channel cannot be listed
      # -- only generated and probed. Distinct from directory_index's version_dir,
      # which reads a real listing.
      probe_versions:
        template: "https://channels.nixos.org/nixos-{version}/latest-nixos-minimal-{token}-linux.iso.sha256"
      sums: "{filename}.sha256"
      token: {from: sidecar_filename, pattern: '-([0-9.]+\.[0-9a-f]+)-{token}'}
    variants:
      # Multi-arch: filename token in a fixed (probed) URL. No listing to enumerate, so
      # stable_symlink offers [x86_64, aarch64] and resolve-verify keeps what exists.
      minimal: {label: "NixOS Minimal", arches: {x86_64: x86_64, aarch64: aarch64}, params: {url: "https://channels.nixos.org/nixos-{version}/latest-nixos-minimal-{token}-linux.iso"}}
      graphical: {label: "NixOS Graphical", arches: {x86_64: x86_64, aarch64: aarch64}, params: {url: "https://channels.nixos.org/nixos-{version}/latest-nixos-graphical-{token}-linux.iso"}}
    discover:
      enumerable: false
      reason: "channels.nixos.org renders its listing client-side; there is no server-side index"

  # The ublue projects: GitHub supplies ONLY the version string. The download URL is
  # fixed on a different host and integrity is a sidecar beside it -- so this is
  # stable_symlink, not github_releases. Each project picks a different arch token,
  # which is why one shared filename convention would be wrong.
  bazzite:
    strategy: stable_symlink
    page_url: "https://bazzite.gg/"
    params:
      sums: "{filename}-CHECKSUM"
      token: {from: atom_tag, repo: "ublue-os/bazzite"}
    variants:
      desktop: {label: "Bazzite Desktop", params: {url: "https://download.bazzite.gg/bazzite-stable-amd64.iso"}}
      deck: {label: "Bazzite Deck", params: {url: "https://download.bazzite.gg/bazzite-deck-stable-amd64.iso"}}
      nvidia-open: {label: "Bazzite NVIDIA Open", params: {url: "https://download.bazzite.gg/bazzite-nvidia-open-stable-amd64.iso"}}
    discover:
      enumerable: false
      reason: "download.bazzite.gg 301s into a Cloudflare cdn-cgi interstitial; no listing"

  bluefin:
    strategy: stable_symlink
    page_url: "https://projectbluefin.io/"
    params:
      sums: "{filename}-CHECKSUM"
      token: {from: atom_tag, repo: "ublue-os/bluefin"}
    variants:
      stable: {label: "Bluefin", params: {url: "https://download.projectbluefin.io/bluefin-stable-x86_64.iso"}}
    discover:
      enumerable: false
      reason: "download.projectbluefin.io returns 404 for its root; no listing"

  aurora:
    strategy: stable_symlink
    page_url: "https://getaurora.dev/"
    params:
      sums: "{filename}-CHECKSUM"
      token: {from: atom_tag, repo: "ublue-os/aurora"}
    variants:
      stable: {label: "Aurora", params: {url: "https://dl.getaurora.dev/aurora-stable-webui-x86_64.iso"}}
      nvidia-open: {label: "Aurora NVIDIA Open", params: {url: "https://dl.getaurora.dev/aurora-nvidia-open-stable-webui-x86_64.iso"}}
    discover:
      # Aurora resolves a fixed URL, but its download host IS a plain index.
      index: "https://dl.getaurora.dev/"
      match: '\.iso$'
      group: '^aurora-(?:(.+)-)?stable-webui-x86_64\.iso$'

  # --------------------------------------------------------------- sourceforge (8)
  # Every RSS <item> appears TWICE, and <title> is a CDATA full path, not a filename.

  mx:
    strategy: sourceforge
    page_url: "https://mxlinux.org/"
    params:
      project: "mx-linux"
      path: "/Final"
      sums: "{path}.sha256"
      sig: "{path}.sig"
      version_pattern: 'MX-([0-9.]+)_'
      ignore: ['_beta\d*_']
    variants:
      xfce: {label: "MX Linux Xfce", params: {match: '/Xfce/MX-[0-9.]+_Xfce_x64\.iso$'}}
      xfce-ahs: {label: "MX Linux Xfce AHS", params: {match: '/Xfce/MX-[0-9.]+_Xfce_ahs_x64\.iso$'}}
      kde: {label: "MX Linux KDE", params: {match: '/KDE/MX-[0-9.]+_KDE_x64\.iso$'}}
      fluxbox: {label: "MX Linux Fluxbox", params: {match: '/Fluxbox/MX-[0-9.]+_fluxbox_x64\.iso$'}}
    discover:
      match: '\.iso$'
      group: 'MX-[0-9.]+_([A-Za-z_]+)_x64\.iso$'

  antix:
    strategy: sourceforge
    page_url: "https://antixlinux.com/"
    params:
      project: "antix-linux"
      path: "/Final"
      sums: "{path}.sha256"
      sig: "{path}.sig"
      version_pattern: 'antiX-([0-9.]+)[-_]'
      # 23.2 sits beside 26 in the same feed, along with a `runit-` subtree and
      # 32-bit `_386` builds. antiX 26 ships only `core` and `full` for x64 --
      # `base` and `net` exist for 23.2 only, so seeding them would pin us backwards.
      ignore: ['_386-', 'runit-', '\.md5$']
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x30AA418A0C723D937B50A986A80582E000067FDD
        fingerprint: 30AA418A0C723D937B50A986A80582E000067FDD
        covers: image
    variants:
      # The release number is NOT hardcoded: `version_pattern` extracts it and
      # `select.newest` picks 26 over the co-listed 23.2. A literal `antiX-26` would
      # freeze the feed at 26 the day 27 ships -- silently, while still resolving.
      full: {label: "antiX Full", params: {match: '/antiX-[0-9.]+/antiX-[0-9.]+_x64-full\.iso$'}}
      core: {label: "antiX Core", params: {match: '/antiX-[0-9.]+/antiX-[0-9.]+_x64-core\.iso$'}}
    discover:
      match: '\.iso$'
      group: '_x64-([a-z]+)\.iso$'
      # 23.2 sits in the same feed and ships editions 26 does not.
      ignore: ['/antiX-2[0-5]', '_386-', 'runit-']

  q4os:
    strategy: sourceforge
    page_url: "https://q4os.org/"
    params:
      project: "q4os"
      path: "/stable"
      # No per-ISO sidecar: ONE aggregate md5sum.txt covering every release, i386
      # and superseded versions included. The filename column is the only
      # disambiguator -- "the first hash" would attach an i386 sum to an x64 ISO.
      sums: "/stable/md5sum.txt"
      version_pattern: 'q4os-([0-9.]+)-'
      ignore: ['i386']
    variants:
      plasma: {label: "Q4OS Plasma", params: {match: '/q4os-[0-9.]+-x64\.r\d+\.iso$'}}
      tde: {label: "Q4OS Trinity", params: {match: '/q4os-[0-9.]+-x64-tde\.r\d+\.iso$'}}
    discover:
      match: '\.iso$'
      group: 'q4os-[0-9.]+-x64-([a-z]+)\.r\d+\.iso$'
      # `instcd` exists only for the superseded 6.6; i386 is another arch.
      ignore: [i386, instcd]

  bluestar:
    strategy: sourceforge
    page_url: "https://bluestarlinux.sourceforge.net/"
    params:
      project: "bluestarlinux"
      path: "/distro"
      sums: "{stem}.md5"      # note: drops the `.iso` -- it is NOT `<name>.iso.md5`
      match: '/bslx-[0-9.-]+-\d{4}\.\d{2}\.\d{2}-x86_64\.iso$'
      version_pattern: 'bslx-([0-9.-]+-\d{4}\.\d{2}\.\d{2})-x86_64'
    variants:
      default: {label: "Bluestar Linux"}
    discover:
      match: '\.iso$'
      group: '^bslx-([a-z]+)-[0-9.-]+-x86_64\.iso$'

  garuda:
    strategy: sourceforge
    page_url: "https://garudalinux.org/downloads"
    params:
      project: "garuda-linux"
      path: "/garuda"
      sums: "{path}.sha256"
      version_pattern: '-(\d{6})\.iso$'
      ignore: ['\.sha1$']     # a co-listed sha1 that must never win over sha256
    variants:
      dr460nized: {label: "Garuda Dr460nized", params: {match: '/dr460nized/\d+/garuda-dr460nized-[a-z-]+-\d+\.iso$'}}
      dr460nized-gaming: {label: "Garuda Dr460nized Gaming", params: {match: '/dr460nized-gaming/\d+/garuda-dr460nized-gaming-[a-z-]+-\d+\.iso$'}}
      gnome: {label: "Garuda GNOME", params: {match: '/gnome/\d+/garuda-gnome-[a-z-]+-\d+\.iso$'}}
      cinnamon: {label: "Garuda Cinnamon", params: {match: '/cinnamon/\d+/garuda-cinnamon-[a-z-]+-\d+\.iso$'}}
      hyprland: {label: "Garuda Hyprland", params: {match: '/hyprland/\d+/garuda-hyprland-[a-z-]+-\d+\.iso$'}}
      i3: {label: "Garuda i3", params: {match: '/i3/\d+/garuda-i3-[a-z-]+-\d+\.iso$'}}
      sway: {label: "Garuda Sway", params: {match: '/sway/\d+/garuda-sway-[a-z-]+-\d+\.iso$'}}
      xfce: {label: "Garuda Xfce", params: {match: '/xfce/\d+/garuda-xfce-[a-z-]+-\d+\.iso$'}}
      kde-lite: {label: "Garuda KDE Lite", params: {match: '/kde-lite/\d+/garuda-kde-lite-[a-z-]+-\d+\.iso$'}}
      mokka: {label: "Garuda Mokka", params: {match: '/mokka/\d+/garuda-mokka-[a-z-]+-\d+\.iso$'}}
    discover:
      group: '^/garuda/([a-z0-9-]+)/'

  cachyos:
    strategy: sourceforge
    page_url: "https://cachyos.org/"
    params:
      project: "cachyos-arch"
      path: "/gui-installer"
      sums: "{path}.sha256"
      sig: "{path}.sig"
      # The directory can disagree with the filename: /handheld/250626/ holds
      # cachyos-handheld-linux-260426.iso. The token comes from the FILENAME.
      version_pattern: '-(\d{6})\.iso$'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x882DCFE48E2051D48E2562ABF3B607488DB35A47
        fingerprint: 882DCFE48E2051D48E2562ABF3B607488DB35A47
        covers: image
    variants:
      desktop: {label: "CachyOS Desktop", params: {match: '/desktop/\d+/cachyos-desktop-linux-\d+\.iso$'}}
      handheld: {label: "CachyOS Handheld", params: {match: '/handheld/\d+/cachyos-handheld-linux-\d+\.iso$'}}
    discover:
      group: '^/gui-installer/([a-z0-9-]+)/'

  # OpenMediaVault -- Debian-based NAS. SourceForge, ISO channel under `/iso` (the project's
  # root RSS defaults to the `.deb` packages pool, so `path` must pin `/iso`). Per-ISO
  # `{path}.sha256` and a detached `{path}.asc` that signs the ISO itself -> covers: image
  # (the antiX/Tails pattern). `version_pattern` tolerates both dotted (8.3.1) and dash (8.0-12)
  # release shapes; one amd64 ISO, no editions, so the group catches a hypothetical future one.
  openmediavault:
    strategy: sourceforge
    page_url: "https://www.openmediavault.org/"
    params:
      project: "openmediavault"
      path: "/iso"
      sums: "{path}.sha256"
      sig: "{path}.asc"
      version_pattern: 'openmediavault_(.+?)-amd64\.iso$'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xD67506C878E08A94FD7E009424863F0C716B980B
        fingerprint: D67506C878E08A94FD7E009424863F0C716B980B
        covers: image
    variants:
      default: {label: "OpenMediaVault", params: {match: '/openmediavault_[0-9.]+(?:-[0-9]+)?-amd64\.iso$'}}
    discover:
      match: '\.iso$'
      group: 'openmediavault_[0-9.-]+-amd64-([a-z]+)\.iso$'

  # Clonezilla Live -- disk imaging. SourceForge project `clonezilla`, stable channel. The
  # `alternative` channel uses date+codename names (20260525-resolute) that out-sort the
  # dotted stable versions, so `path` pins stable and `match` requires the dotted shape.
  # Checksums are NOT on SourceForge -- they live off-host at a fixed clonezilla.org path, so
  # `sums`/`sig` are absolute URLs used verbatim. CHECKSUMS.TXT is multi-section (MD5/SHA256/
  # SHA512); `checksums.parse` keeps the strongest per name. Detached CHECKSUMS.TXT.gpg (the
  # DRBL project key) -> covers: checksums. One amd64 edition, so the group catches a future one.
  clonezilla:
    strategy: sourceforge
    page_url: "https://clonezilla.org/downloads.php"
    params:
      project: "clonezilla"
      path: "/clonezilla_live_stable"
      sums: "https://clonezilla.org/downloads/stable/data/CHECKSUMS.TXT"
      sig: "https://clonezilla.org/downloads/stable/data/CHECKSUMS.TXT.gpg"
      version_pattern: 'clonezilla-live-([0-9.-]+)-amd64\.iso$'
      ignore: ['\.zip$', 'i686', 'i386']
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x54C0821A48715DAFD61BFCAF667857D045599AFD
        fingerprint: 54C0821A48715DAFD61BFCAF667857D045599AFD
        covers: checksums
    variants:
      default: {label: "Clonezilla Live", params: {match: '/clonezilla-live-[0-9.-]+-amd64\.iso$'}}
    discover:
      match: '\.iso$'
      group: 'clonezilla-live-[0-9.-]+-amd64-([a-z]+)\.iso$'

  # ----------------------------------------------------------- github_releases (2)
  # GitHub *assets*. The ublue projects are NOT here; they only borrow a version tag.

  anduinos:
    strategy: github_releases
    page_url: "https://www.anduinos.com/"
    params:
      # Every release asset is a `.torrent` -- 22 of them, one per locale, and no
      # ISO anywhere. The torrent names the ISO it serves (`AnduinOS-1.4.2-en_US.iso`).
      #
      # Nothing signs the torrent and no checksum is published, so `verify` is
      # `torrent`: the infohash covers every piece, but only on trust-on-first-use.
      # The tracker is a public one (opentrackr.org), not first-party.
      repo: "Anduin2017/AnduinOS"
      version_pattern: 'AnduinOS-([0-9.]+)-'
    variants:
      # `variant_key` lowercases and maps `_` to `-`, so the config key is `en-us`
      # while the artifact is `en_US`. Naming it `en_US` makes the audit report
      # `en-us` as UNEXPLAINED on every run, forever.
      en-us: {label: "AnduinOS", params: {torrent_only: true, match: '^AnduinOS-[0-9.]+-en_US\.torrent$'}}
    discover:
      # 21 locale builds of the same release, not editions. One lookahead beats a
      # 21-entry list; `ignore` is compiled with re.IGNORECASE.
      match: '\.torrent$'
      group: '^AnduinOS-[0-9.]+-([a-z]{2}_[A-Z]{2})\.torrent$'
      ignore: ['-(?!en_US)[a-z]{2}_[A-Z]{2}\.torrent$']

  minios:
    strategy: github_releases
    page_url: "https://minios.dev/"
    params:
      repo: "minios-linux/minios-live"
      sums_suffix: ".sha256"
      version_pattern: '-([0-9.]+)\.iso$'
    variants:
      standard: {label: "MiniOS Standard", params: {match: '^minios-\w+-xfce-standard-amd64-[0-9.]+\.iso$'}}
      toolbox: {label: "MiniOS Toolbox", params: {match: '^minios-\w+-xfce-toolbox-amd64-[0-9.]+\.iso$'}}
      ultra: {label: "MiniOS Ultra", params: {match: '^minios-\w+-xfce-ultra-amd64-[0-9.]+\.iso$'}}
    discover:
      group: '^minios-\w+-xfce-([a-z]+)-amd64-'

  # ---------------------------------------------------------------- page_index (4)
  # The last resort. Only the LISTING step is fragile; everything downstream is the
  # same pipeline every other strategy uses.

  nobara:
    strategy: page_index
    page_url: "https://nobaraproject.org/"
    params:
      url: "https://nobaraproject.org/download-nobara/"
      attr: "data-url"        # stabler than href markup; the page exposes it directly
      # `.sha256` 404s. The real suffix is `.sha256sum`, which only the page's own
      # script.js reveals. Its filename column reads `./Nobara-...iso` -- the leading
      # `./` is normalized away, or every lookup misses and the entry looks unsigned.
      sums: "{filename}.sha256sum"
      version_pattern: 'Nobara-(\d+)-[A-Za-z-]+-(\d{4}-\d{2}-\d{2})\.iso$'
    variants:
      gnome: {label: "Nobara GNOME", params: {match: '^Nobara-\d+-GNOME-\d{4}-\d{2}-\d{2}\.iso$'}}
      gnome-nv: {label: "Nobara GNOME (NVIDIA)", params: {match: '^Nobara-\d+-GNOME-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      kde: {label: "Nobara KDE", params: {match: '^Nobara-\d+-KDE-\d{4}-\d{2}-\d{2}\.iso$'}}
      kde-nv: {label: "Nobara KDE (NVIDIA)", params: {match: '^Nobara-\d+-KDE-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      official: {label: "Nobara Official", params: {match: '^Nobara-\d+-Official-\d{4}-\d{2}-\d{2}\.iso$'}}
      official-nv: {label: "Nobara Official (NVIDIA)", params: {match: '^Nobara-\d+-Official-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      steam-htpc: {label: "Nobara Steam HTPC", params: {match: '^Nobara-\d+-Steam-HTPC-\d{4}-\d{2}-\d{2}\.iso$'}}
      steam-htpc-nv: {label: "Nobara Steam HTPC (NVIDIA)", params: {match: '^Nobara-\d+-Steam-HTPC-NV-\d{4}-\d{2}-\d{2}\.iso$'}}
      steam-handheld: {label: "Nobara Steam Handheld", params: {match: '^Nobara-\d+-Steam-Handheld-\d{4}-\d{2}-\d{2}\.iso$'}}
    discover:
      # The page is the only surface Nobara has, so enumerate it: a new edition here
      # is otherwise invisible until someone notices. (Official / Steam-HTPC /
      # Steam-Handheld all existed on day one and were missed for exactly that reason.)
      match: '\.iso$'
      group: '^Nobara-\d+-(.+?)-\d{4}-\d{2}-\d{2}\.iso$'

  manjaro:
    strategy: page_index
    page_url: "https://manjaro.org/"
    params:
      # /download/ is a 95-byte <meta refresh> stub; curl -L does not follow HTML
      # refreshes, which makes it look like an empty JS page. This is the real page.
      # Manjaro's SourceForge project is a trap: every ISO there is a `-pre` build.
      url: "https://manjaro.org/products/download/x86"
      sums: "{filename}.sha256"
      sig: "{filename}.sig"
      # Manjaro can co-publish kernel builds (linux612 / linux618 / linux70) of one
      # release. The kernel belongs in the TOKEN -- a different kernel is different
      # bytes, so it must be a different guid -- but it must not ORDER the
      # candidates: as integers 618 > 70, while as kernels 7.0 > 6.18. So sort on
      # release + build date and let the name tie-break, where linux70 > linux618.
      version_pattern: '-([0-9.]+-\d{6}-linux\d+)\.iso$'
      sort_pattern: '-([0-9.]+-\d{6})-linux\d+\.iso$'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3B794DE6D4320FCE594F4171279E7CF5D8D56EC8
        fingerprint: 3B794DE6D4320FCE594F4171279E7CF5D8D56EC8
        covers: image
    variants:
      kde: {label: "Manjaro KDE Plasma", params: {match: '^manjaro-kde-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      gnome: {label: "Manjaro GNOME", params: {match: '^manjaro-gnome-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      xfce: {label: "Manjaro Xfce", params: {match: '^manjaro-xfce-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      cinnamon: {label: "Manjaro Cinnamon", params: {match: '^manjaro-cinnamon-[0-9.]+-\d{6}-linux\d+\.iso$'}}
      i3: {label: "Manjaro i3", params: {match: '^manjaro-i3-[0-9.]+-\d{6}-linux\d+\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^manjaro-([a-z0-9]+)-'

  # TrueNAS SCALE -- the download root is ONE flat, server-rendered HTML page listing every
  # release across every codename as RELATIVE hrefs (the per-version subdirs are a client-
  # rendered Storj SPA with no file links). page_index scrapes the root and resolves each
  # sidecar next to the chosen ISO, so the codename in the path never has to be known. The
  # match is branding-agnostic -- TrueNAS 26 drops the `SCALE-` infix, and `-BETA`/`-MASTER`
  # pre-releases are rejected by their letters. `.iso.gpg` is a detached PGP sig over the ISO
  # -> covers: image (IX SecTeam key; image-mode checks only the issuer, so the key's 2023
  # expiry is irrelevant -- a checksums gate WOULD fail on it, which is a second reason for image).
  truenas:
    strategy: page_index
    page_url: "https://www.truenas.com/download/"
    params:
      url: "https://download.sys.truenas.net/"
      attr: href
      match: '^TrueNAS-(?:SCALE-)?[0-9.]+\.iso$'
      version_pattern: 'TrueNAS-(?:SCALE-)?([0-9.]+)\.iso$'
      sums: "{filename}.sha256"
      sig: "{filename}.gpg"
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xC8D62DEF767C1DB0DFF4E6EC358EAA9112CF7946
        fingerprint: C8D62DEF767C1DB0DFF4E6EC358EAA9112CF7946
        covers: image
    variants:
      scale: {label: "TrueNAS SCALE"}
    discover:
      # One ISO per release, no edition segment: the group yields nothing today (Arch/Tails
      # pattern) but would surface a future `TrueNAS-...-<edition>.iso`.
      match: '\.iso$'
      group: '^TrueNAS-(?:SCALE-)?[0-9.]+-([a-z]+)\.iso$'

  # Memtest86+ -- the bootable image lives only on memtest.org (its GitHub release has zero
  # assets), linked as RELATIVE hrefs, and the artifact is a ZIP-WRAPPED ISO (.iso.zip). The
  # checksum is a fixed sibling `sha256sum.txt` (GNU, with a `v<ver>/` path prefix the parser
  # normalizes away); no signature is published -> verify: checksum. The group is anchored to
  # x86_64 and captures an edition (the `grub` build, which is ignored) so the plain ISO
  # proposes nothing and the arch never becomes the variant key.
  memtest:
    strategy: page_index
    page_url: "https://www.memtest.org/"
    params:
      url: "https://www.memtest.org/"
      attr: href
      match: '^mt86plus_[0-9.]+_x86_64\.iso\.zip$'
      version_pattern: 'mt86plus_([0-9.]+)_x86_64'
      sums: "sha256sum.txt"
    variants:
      iso: {label: "Memtest86+"}
    discover:
      match: '\.iso\.zip$'
      group: '^mt86plus_[0-9.]+_x86_64(?:\.([a-z]+))?\.iso\.zip$'
      ignore: ['grub']

  ghostbsd:
    strategy: directory_index
    page_url: "https://www.ghostbsd.org/download"
    params:
      # `latest/` is a self-updating symlink dir (Arch shape) -- avoids sorting the mixed
      # 24.07.3 vs 26.1-R15.0p2 version schemes. amd64 only (no arm64 tree exists).
      index: "https://download.ghostbsd.org/releases/amd64/latest/"
      sums: "{filename}.sha256"        # per-ISO BSD-format sidecar: "SHA256 (name) = hash"
      torrent: "{filename}.torrent"    # no torrent checksum -> trust-on-first-use; ISO stays verified
      version_pattern: 'GhostBSD-([0-9.]+-R[0-9.]+(?:p[0-9]+)?)'
    variants:
      # The bare .iso is the MATE (default) flavor; its name carries no DE token.
      mate: {label: "GhostBSD MATE", params: {match: '^GhostBSD-[0-9.]+-R[0-9.]+(?:p[0-9]+)?\.iso$'}}
      xfce: {label: "GhostBSD XFCE", params: {match: '^GhostBSD-[0-9.]+-R[0-9.]+(?:p[0-9]+)?-XFCE\.iso$'}}
      gershwin: {label: "GhostBSD Gershwin", params: {match: '^GhostBSD-[0-9.]+-R[0-9.]+(?:p[0-9]+)?-GERSHWIN\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^GhostBSD-[0-9.]+-R[0-9.]+(?:p[0-9]+)?-([A-Za-z]+)\.iso$'

  xcp-ng:
    strategy: directory_index
    page_url: "https://docs.xcp-ng.org/installation/install-xcp-ng/"
    params:
      version_dir: "https://mirrors.xcp-ng.org/isos/"
      version_dir_match: '^\d+\.\d+$'          # excludes the drivers/ dir
      index: "{version}/"
      sums: "SHA256SUMS"                        # aggregate GNU "<hash>  <name>"
      sig: "SHA256SUMS.asc"                     # detached PGP over SHA256SUMS
      # TWO capture groups on purpose: from_filename joins them to the display token
      # `8.3.0-20250606.2`, but version_key sorts on the LAST group (the date.refresh). A single
      # group `8.3.0-20250606.2` fails packaging.Version -> tier-1, while the older `8.3.0-20250606`
      # parses clean as tier-2 and would wrongly win, resolving the stale ISO.
      version_pattern: 'xcp-ng-([0-9.]+)-([0-9]+(?:\.[0-9]+)?)(?:-netinstall)?\.iso$'
      signing_key:
        # Not on public keyservers -- only in the xcp-ng-release repo (like the RHEL-rebuild repo keys).
        url: https://raw.githubusercontent.com/xcp-ng/xcp-ng-release/master/src/common/etc/pki/rpm-gpg/RPM-GPG-KEY-xcpng
        fingerprint: 34AC2EB68248FED6D076838ACD75783A3FD3AC9E
        covers: checksums
    variants:
      # Two install .iso decoys (…20250606.2.iso and …20250606.iso); max-version picks .2 (a re-hash refresh).
      install: {label: "XCP-ng", params: {match: '^xcp-ng-[0-9.]+-[0-9]+(?:\.[0-9]+)?\.iso$'}}
      netinstall: {label: "XCP-ng netinstall", params: {match: '^xcp-ng-[0-9.]+-[0-9]+-netinstall\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^xcp-ng-[0-9.]+-[0-9]+(?:\.[0-9]+)?(?:-([a-z]+))?\.iso$'

  qubes:
    strategy: directory_index
    page_url: "https://www.qubes-os.org/downloads/"
    params:
      index: "https://ftp.qubes-os.org/iso/"
      # R4.3.1 (Jun 2026) switched to a plain DIGESTS + detached .DIGESTS.asc. DIGESTS lists
      # sha256+sha512 (GNU "<hash> *<name>"); the parser keeps sha512.
      sums: "{filename}.DIGESTS"
      sig: "{filename}.DIGESTS.asc"
      match: '^Qubes-R[0-9.]+-x86_64\.iso$'     # `[0-9.]+` can't span `4.3.1-rc1`, so RCs are excluded
      version_pattern: 'Qubes-R([0-9.]+)-x86_64'
      ignore: ['-rc']                           # belt; the anchor already drops the co-located -rcN images
      torrent: "{filename}.torrent"             # no torrent checksum -> trust-on-first-use
      signing_key:
        # "Qubes OS Release 4.3 Signing Key" -- a NEW per-minor key signs R4.4/R5.0, so the gate
        # will degrade that entry to `checksum` and --strict flag it (like the RHEL-rebuild majors).
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xF3FA3F99D6281F7B3A3E5E871C3D9B627F3FADA4
        fingerprint: F3FA3F99D6281F7B3A3E5E871C3D9B627F3FADA4
        covers: checksums
    variants:
      iso: {label: "Qubes OS"}
    discover:
      match: '\.iso$'
      group: '^Qubes-R[0-9.]+-([a-z]+)-x86_64\.iso$'

  gentoo:
    strategy: directory_index
    page_url: "https://www.gentoo.org/downloads/"
    params:
      # Fixed `current-*` pointer dir (Arch shape): always holds the newest weekly autobuild.
      # {token} is the arch, spelled the same in the path and the filename.
      index: "https://distfiles.gentoo.org/releases/{token}/autobuilds/current-install-{token}-minimal/"
      # Use the clearsigned single-SHA256 sidecar, NOT .DIGESTS: .DIGESTS carries SHA512 *and*
      # BLAKE2B, both 128 hex, and length-based algo detection would mislabel BLAKE2B as sha512.
      sums: "{filename}.sha256"
      sig: "{filename}.sha256"                  # the clearsigned .sha256 is its own signature
      version_pattern: '-(\d{8}T\d{6}Z)\.iso$'  # datestamp = change-token; re-notifies each weekly build
      signing_key:
        # Pin the primary; it signs via subkey 2C44695DB9F6043D (primary-or-subkey, the Tails case).
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x13EBBDBEDE7A12775DFDB1BABB572E0E2D182910
        fingerprint: 13EBBDBEDE7A12775DFDB1BABB572E0E2D182910
        covers: clearsigned
    variants:
      minimal:
        label: "Gentoo Minimal Install CD"
        arches: {x86_64: amd64, aarch64: arm64}
        params: {match: '^install-{token}-minimal-\d{8}T\d{6}Z\.iso$'}
      livegui:
        # Overrides the {token} distro index with a concrete amd64 URL (no arches -> no {token} left).
        label: "Gentoo LiveGUI"
        params:
          index: "https://distfiles.gentoo.org/releases/amd64/autobuilds/current-livegui-amd64/"
          match: '^livegui-amd64-\d{8}T\d{6}Z\.iso$'
    discover:
      enumerable: false
      reason: "ISO products live in separate current-* pointer dirs (install-*-minimal, livegui-*); the shared autobuilds root also lists stage3/stage4 tarballs and di-* disk images that are not ISOs. arm64 minimal is seeded via arches."

  chimeraos:
    strategy: github_releases
    page_url: "https://chimeraos.org/"
    params:
      # The installer ISO repo -- NOT ChimeraOS/chimeraos, which ships frzr OS payloads (.img.tar.xz).
      repo: "ChimeraOS/install-media"
      # install-media tags are bare dates with no rc/beta text, so name-based is_prerelease can't see
      # a build; honor GitHub's prerelease flag to skip it for the stable release the download page uses.
      honor_prerelease_flag: true
      sums_asset: "sha256sum.txt"               # one aggregate asset "<sha256>  chimeraos-<date>-x86_64.iso"
      version_pattern: 'chimeraos-([0-9.]+)-x86_64\.iso$'   # dotted date = change-token
    variants:
      iso: {label: "ChimeraOS", params: {match: '^chimeraos-[0-9.]+-x86_64\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^chimeraos-[0-9.]+-([a-z]+)-x86_64\.iso$'
