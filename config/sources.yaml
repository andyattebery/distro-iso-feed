# The config IS the interface. Adding a distro is an edit here, not a code change.
# Every endpoint below was verified by extracting the artifact a strategy would use --
# a filename, a checksum line, a version token -- never by trusting an HTTP 200.
#
# `version_pattern` extracts the CHANGE-TOKEN, not the marketing version. If the bytes
# move, the token must move, or `guid()` stays put and no subscriber ever sees it.
# `ignore` lists decoys: artifacts co-located with the one we want. They belong here
# and not only in `match`, because `match` guards the feed while `ignore` guards the
# weekly discovery PR.

defaults:
  arch: x86_64
  user_agent: "distro-iso-feed/1.0 (+https://github.com/andyattebery/distro-iso-feed)"

# Families let discovery propose a whole NEW distro block (not just a new variant): a listable
# `root` whose subdirectories are members, a `model` distro to clone, and an `ignore` list that is
# both the non-member filter and the sticky-decline for members left out on purpose. A candidate is
# proposed only after its cloned block RESOLVES live (that filters infra dirs and non-desktop
# products on its own); `ignore` covers the rest (the main `ubuntu`, server/core products, and EOL
# flavors like `ubuntu-gnome` that still resolve an ancient ISO). The ublue projects can't use this
# -- their download hosts publish no listing -- so they stay hand-maintained.
families:
  ubuntu-flavors:
    root: "https://cdimage.ubuntu.com/"
    member_match: '^[a-z][a-z0-9-]+$'
    model: kubuntu
    ignore: [ubuntu, ubuntu-base, ubuntu-core, ubuntu-core-desktop, ubuntu-core-installer, ubuntu-server, ubuntu-legacy-server, ubuntu-mini-iso, ubuntu-wsl, ubuntu-gnome, mythbuntu, netboot, nvidia-tegra, releases, streams, include]

distros:

  # ---------------------------------------------------------------- json_api (2)

  fedora:
    strategy: json_api
    page_url: "https://fedoraproject.org/"
    params:
      url: "https://fedoraproject.org/releases.json"
      # releases.json lists v42/43/44 side by side; json_api takes the max version.
      # The respin suffix (`-1.7`) lives only in the filename, and a respin ships a
      # new sha256 -- so the token comes from the filename, not the `version` field.
      # Two filename shapes: `...-44-1.7.x86_64.iso` (Live) and
      # `...-ostree-x86_64-44-1.7.iso` (Atomic). One pattern must serve both.
      version_pattern: '(\d+-\d+\.\d+)(?:\.[a-z0-9_]+)?\.iso$'
    variants:
      workstation: {label: "Fedora Workstation", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le}, select: {subvariant: Workstation, link_contains: "Workstation-Live"}}
      server: {label: "Fedora Server", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le, s390x: s390x}, select: {subvariant: Server, link_contains: "Server-netinst"}}
      kde: {label: "Fedora KDE Plasma", arches: {x86_64: x86_64, aarch64: aarch64, ppc64le: ppc64le}, select: {subvariant: KDE, link_contains: "KDE-Desktop-Live"}}
      silverblue: {label: "Fedora Silverblue", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: Silverblue, link_contains: "ostree"}}
      kinoite: {label: "Fedora Kinoite", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: Kinoite, link_contains: "ostree"}}
      sericea: {label: "Fedora Sway Atomic", arches: {x86_64: x86_64}, select: {subvariant: Sericea, link_contains: "ostree"}}
      onyx: {label: "Fedora Budgie Atomic", arches: {x86_64: x86_64}, select: {subvariant: Onyx, link_contains: "ostree"}}
      cosmic-atomic: {label: "Fedora COSMIC Atomic", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: COSMIC-Atomic, link_contains: "ostree"}}
      # Desktop spins. `Mate` is the one whose subvariant never appears in its own
      # filename -- the artifact is `Fedora-MATE_Compiz-Live-...`.
      budgie: {label: "Fedora Budgie", arches: {x86_64: x86_64}, select: {subvariant: Budgie, link_contains: "Budgie-Live"}}
      cinnamon: {label: "Fedora Cinnamon", arches: {x86_64: x86_64}, select: {subvariant: Cinnamon, link_contains: "Cinnamon-Live"}}
      cosmic: {label: "Fedora COSMIC", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: COSMIC, link_contains: "COSMIC-Live"}}
      i3: {label: "Fedora i3", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: i3, link_contains: "i3-Live"}}
      lxde: {label: "Fedora LXDE", arches: {x86_64: x86_64}, select: {subvariant: LXDE, link_contains: "LXDE-Live"}}
      lxqt: {label: "Fedora LXQt", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: LXQt, link_contains: "LXQt-Live"}}
      mate: {label: "Fedora MATE", arches: {x86_64: x86_64}, select: {subvariant: Mate, link_contains: "MATE_Compiz-Live"}}
      miraclewm: {label: "Fedora MiracleWM", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: MiracleWM, link_contains: "MiracleWM-Live"}}
      sway: {label: "Fedora Sway", arches: {x86_64: x86_64}, select: {subvariant: Sway, link_contains: "Sway-Live"}}
      xfce: {label: "Fedora Xfce", arches: {x86_64: x86_64, aarch64: aarch64}, select: {subvariant: Xfce, link_contains: "Xfce-Live"}}
    discover:
      # `match` drops non-ISO rows (releases.json also lists qcow2/vhd/tar.xz), and
      # `ignore` is written against the FILENAME, not the variant key it produces:
      # the artifact is `Fedora-Cloud-Base-...`, never `Cloud_Base`.
      #
      # Group on the `subvariant` FIELD, not the filename. The artifact for Mate is
      # `Fedora-MATE_Compiz-Live-...`, so filename-grouping proposes `mate_compiz` --
      # a duplicate of the `mate` variant that already exists. `i3` has the opposite
      # problem: a digit that a letters-only regex silently skips.
      # Labs (Astronomy, Jam, Robotics, ...) stay ignored -- niche images, not spins.
      match: '\.iso$'
      group_field: subvariant
      group: '^([A-Za-z0-9_-]+)$'
      ignore: ["Cloud", "Container", "IoT", "Everything", "SoaS", "FEX", "WSL", "Python", "Scientific", "Astronomy", "Design", "Games", "Jam", "Robotics", "Security", "Mobile", "Minimal"]

  pop-os:
    strategy: json_api
    page_url: "https://pop.system76.com/"
    params:
      # `build` is what moves between respins of one release; version alone would not.
      version_fields: [version, build]
      # api.pop-os.org exposes exactly ONE endpoint -- `builds/{version}/{channel}`
      # (see pop-os/api, `Build::url()`). There is no release index to read, so the
      # release is PROBED. A literal here is how a feed serves 24.04 forever: a
      # pinned source resolves cleanly, publishes a valid checksum, and is wrong.
      #
      # Both `.04` and `.10`: the API still answers for 20.10 / 21.04 / 21.10, so
      # interims are a real shape and an LTS-only probe would be a fresh pin.
      # `requires: url` rejects a 200 carrying an error envelope, which Pop's own
      # web client guards against (`if (body.errors != null) throw`).
      probe_versions:
        generator: ubuntu_style
        requires: url
        template: "https://api.pop-os.org/builds/{version}/intel"
    variants:
      intel: {label: "Pop!_OS (Intel/AMD)", params: {url: "https://api.pop-os.org/builds/{version}/intel"}}
      nvidia: {label: "Pop!_OS (NVIDIA)", params: {url: "https://api.pop-os.org/builds/{version}/nvidia"}}
    discover:
      enumerable: false
      reason: "variants are separate endpoints (builds/<rel>/intel vs /nvidia), never rows in one document"

  # --------------------------------------------------------- directory_index (16)

  debian:
    strategy: directory_index
    page_url: "https://www.debian.org/"
    params:
      sums: "SHA512SUMS"
      sig: "SHA512SUMS.sign"
      # `debian-edu-...-netinst.iso` sits in the same SHA512SUMS. Anchor, or ship Edu.
      ignore: ["debian-edu-"]
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xDF9B9C49EAA9298432589D76DA87E80D6294BE9B
        fingerprint: DF9B9C49EAA9298432589D76DA87E80D6294BE9B
        covers: checksums
    variants:
      netinst:
        label: "Debian netinst"
        # Multi-arch: netinst ships for several arches (Debian Live, below, is amd64-only).
        # `arches` is {canonical: upstream-token}; `{token}` is substituted into the URL/match,
        # and the canonical name keys the entry (x86_64 stays implicit, so amd64 is unchanged).
        arches: {x86_64: amd64, aarch64: arm64, armhf: armhf, ppc64le: ppc64el, riscv64: riscv64, s390x: s390x}
        params:
          index: "https://cdimage.debian.org/debian-cd/current/{token}/iso-cd/"
          match: '^debian-[0-9.]+-{token}-netinst\.iso$'
          version_pattern: 'debian-([0-9.]+)-{token}'
          # The torrent sits in a sibling dir, `bt-cd/`, with its own GPG-signed
          # SHA512SUMS -- so the entry carries both a direct download and a fully
          # verified torrent. `urljoin` resolves `../bt-cd/` against the ISO URL.
          torrent: "../bt-cd/{filename}.torrent"
          torrent_sums: "../bt-cd/SHA512SUMS"
      live-gnome: {label: "Debian Live GNOME", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-gnome\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-kde: {label: "Debian Live KDE", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-kde\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-xfce: {label: "Debian Live Xfce", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-xfce\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-cinnamon: {label: "Debian Live Cinnamon", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-cinnamon\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-mate: {label: "Debian Live MATE", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-mate\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-lxqt: {label: "Debian Live LXQt", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-lxqt\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-lxde: {label: "Debian Live LXDE", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-lxde\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
      live-standard: {label: "Debian Live Standard", params: {index: "https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/", match: '^debian-live-[0-9.]+-amd64-standard\.iso$', version_pattern: 'live-([0-9.]+)-amd64', torrent: "../bt-hybrid/{filename}.torrent", torrent_sums: "../bt-hybrid/SHA512SUMS"}}
    discover:
      # `debian-edu-` and `debian-mac-` never match: the regex needs digits where they
      # put a word, so both are skipped without needing an `ignore` entry.
      #
      # The edition group takes hyphens so `debian-junior` produces a key rather than
      # failing to match. A regex that cannot see an artifact cannot decide about it;
      # Junior is a Pure Blend, not a desktop edition, so it is ignored on purpose.
      match: '\.iso$'
      group: '^debian-(live)?-?[0-9.]+-amd64-([a-z-]+)\.iso$'
      ignore: ['-debian-junior\.iso$']

  kali:
    strategy: directory_index
    page_url: "https://www.kali.org/get-kali/"
    params:
      # NOT `current/`: a partial mirror. Use the versioned dir, which self-updates.
      #
      # `live`, `live-everything` and `installer-everything` are in SHA256SUMS but
      # 404 as direct downloads -- they ship by torrent. Their `match` therefore
      # selects the `.torrent`, and the torrent names the ISO it serves.
      #
      # SHA256SUMS is signed and lists BOTH the ISO and the `.torrent`, so the
      # torrent's bytes are checked against a signature before its infohash is
      # published. A torrent's own piece hashes only prove it agrees with itself.
      version_dir: "https://cdimage.kali.org/"
      version_dir_match: '^kali-\d{4}\.\d+$'
      index: "{version}/"
      sums: "SHA256SUMS"
      sig: "SHA256SUMS.gpg"
      version_pattern: 'kali-linux-([0-9.]+)-'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x827C8569F2518CC677FECA1AED65462EC8D5E4C5
        fingerprint: 827C8569F2518CC677FECA1AED65462EC8D5E4C5
        covers: checksums
    variants:
      # Multi-arch: filename token, Kali's x86_64 token is `amd64` (so `arches` keys x86_64 to it).
      # Discovery fills aarch64 (`arm64`), and only for the variants Kali ships it (installer,
      # installer-netinst, live) -- purple/everything stay amd64-only. Kali no longer ships i386.
      installer: {label: "Kali Installer", arches: {x86_64: amd64, aarch64: arm64}, params: {match: '^kali-linux-[0-9.]+-installer-{token}\.iso$'}}
      installer-netinst: {label: "Kali NetInstaller", arches: {x86_64: amd64, aarch64: arm64}, params: {match: '^kali-linux-[0-9.]+-installer-netinst-{token}\.iso$'}}
      installer-purple: {label: "Kali Purple", arches: {x86_64: amd64}, params: {match: '^kali-linux-[0-9.]+-installer-purple-{token}\.iso$'}}
      live: {label: "Kali Live", arches: {x86_64: amd64, aarch64: arm64}, params: {torrent_only: true, match: '^kali-linux-[0-9.]+-live-{token}\.iso\.torrent$'}}
      live-everything: {label: "Kali Live (everything)", arches: {x86_64: amd64}, params: {torrent_only: true, match: '^kali-linux-[0-9.]+-live-everything-{token}\.iso\.torrent$'}}
      installer-everything: {label: "Kali Installer (everything)", arches: {x86_64: amd64}, params: {torrent_only: true, match: '^kali-linux-[0-9.]+-installer-everything-{token}\.iso\.torrent$'}}
    discover:
      # `.iso.torrent` rows must reach `group`, or the three torrent-only variants
      # above are reported UNEXPLAINED on every run. The suffix is NON-CAPTURING:
      # `variant_key` joins every capture group, so `(\.torrent)?` yields the key
      # `installer-.torrent`. The `.7z` torrents (hyperv/qemu/virtualbox/vmware)
      # need no `ignore` -- `match` requires `.iso` before the suffix.
      match: '\.iso(?:\.torrent)?$'
      group: '^kali-linux-[0-9.]+-(.+)-amd64\.iso(?:\.torrent)?$'
      ignore: [arm64, i386]

  # Parrot OS -- a security distro like Kali. Integrity is a single CLEARSIGNED `signed-hashes.txt`
  # (the AlmaLinux shape): it lists md5/sha256/sha512 for every ISO, and the checksum parser keeps
  # the strongest (sha512). `sums` and `sig` are the same file; the clearsigned gate reads the
  # published checksum out of the region it just verified. amd64 only.
  parrot:
    strategy: directory_index
    page_url: "https://www.parrotsec.org/download/"
    params:
      version_dir: "https://deb.parrot.sh/parrot/iso/"
      version_dir_match: '^[0-9.]+$'
      index: "{version}/"
      sums: "signed-hashes.txt"
      sig: "signed-hashes.txt"
      version_pattern: '-([0-9.]+)_amd64'
      signing_key:
        url: https://deb.parrot.sh/parrot/misc/parrotsec.gpg
        fingerprint: B711822346552E4D92DA02DF7A8286AF0E81EE4A
        covers: clearsigned
    variants:
      home: {label: "Parrot Home", params: {match: '^Parrot-home-[0-9.]+_amd64\.iso$'}}
      security: {label: "Parrot Security", params: {match: '^Parrot-security-[0-9.]+_amd64\.iso$'}}
      spin-htb: {label: "Parrot HTB", params: {match: '^Parrot-spin-htb-[0-9.]+_amd64\.iso$'}}
      spin-mate: {label: "Parrot MATE", params: {match: '^Parrot-spin-mate-[0-9.]+_amd64\.iso$'}}
      spin-lxqt: {label: "Parrot LXQt", params: {match: '^Parrot-spin-lxqt-[0-9.]+_amd64\.iso$'}}
      spin-enlightenment: {label: "Parrot Enlightenment", params: {match: '^Parrot-spin-enlightenment-[0-9.]+_amd64\.iso$'}}
    discover:
      match: '\.iso$'
      group: '^Parrot-(.+)-[0-9.]+_amd64\.iso$'

  void:
    strategy: directory_index
    page_url: "https://voidlinux.org/"
    params:
      index: "https://repo-default.voidlinux.org/live/current/"
      sums: "sha256sum.txt"
      version_pattern: '{token}-(\d{8})-'
      # musl builds sit beside glibc in the same sha256sum.txt; the ignore also keeps
      # `aarch64-musl` out of arch discovery (we track the glibc `aarch64`, not the musl one).
      ignore: ["-musl-"]
    variants:
      # Multi-arch: filename token (`void-live-{arch}-…`), all arches in one dir. `arches` seeds
      # x86_64; discovery fills aarch64 (32-bit `i686` and `asahi` are proposed too -- trim in review).
      base: {label: "Void Linux base", arches: {x86_64: x86_64, aarch64: aarch64, asahi: asahi, i686: i686}, params: {match: '^void-live-{token}-\d{8}-base\.iso$'}}
      xfce: {label: "Void Linux Xfce", arches: {x86_64: x86_64, aarch64: aarch64, asahi: asahi, i686: i686}, params: {match: '^void-live-{token}-\d{8}-xfce\.iso$'}}
    discover:
      group: '^void-live-x86_64-\d{8}-([a-z0-9]+)\.iso$'
      ignore: ["-musl-"]

  mint:
    strategy: directory_index
    mirror: true    # Mint is mirror-distributed; kernel.org is the smallest index
    page_url: "https://linuxmint.com/"
    params:
      version_dir: "https://mirrors.edge.kernel.org/linuxmint/stable/"
      index: "{version}/"
      sums: "sha256sum.txt"
      sig: "sha256sum.txt.gpg"
      version_pattern: 'linuxmint-([0-9.]+)-'
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x27DEB15644C6B3CF3BD7D291300F846BA25BAE09
        fingerprint: 27DEB15644C6B3CF3BD7D291300F846BA25BAE09
        covers: checksums
    variants:
      cinnamon: {label: "Linux Mint Cinnamon", params: {match: '^linuxmint-[0-9.]+-cinnamon-64bit\.iso$'}}
      mate: {label: "Linux Mint MATE", params: {match: '^linuxmint-[0-9.]+-mate-64bit\.iso$'}}
      xfce: {label: "Linux Mint Xfce", params: {match: '^linuxmint-[0-9.]+-xfce-64bit\.iso$'}}
    discover:
      group: '^linuxmint-[0-9.]+-([a-z]+)-64bit\.iso$'

  arch:
    strategy: directory_index
    mirror: true
    page_url: "https://archlinux.org/download/"
    params:
      index: "https://geo.mirror.pkgbuild.com/iso/latest/"
      sums: "sha256sums.txt"
      sig: "{filename}.sig"
      # The dated name, not the `archlinux-x86_64.iso` symlink: the symlink offers
      # nothing to version by, though both share one hash in sha256sums.txt.
      match: '^archlinux-\d{4}\.\d{2}\.\d{2}-x86_64\.iso$'
      version_pattern: 'archlinux-(\d{4}\.\d{2}\.\d{2})-'
      # `{filename}.torrent` sits beside the ISO; no checksum is published for it, so
      # it is trust-on-first-use while the ISO stays GPG-signed.
      torrent: "{filename}.torrent"
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3E80CA1A8B89F69CBA57D98A76A5EF9054449A5C
        fingerprint: 3E80CA1A8B89F69CBA57D98A76A5EF9054449A5C
        covers: image
    variants:
      iso: {label: "Arch Linux"}
    discover:
      # Arch ships one ISO. The group needs an edition segment, which today's name has
      # not got -- so it yields no key and proposes nothing, while a hypothetical
      # `archlinux-lite-<date>-x86_64.iso` would surface immediately.
      match: '\.iso$'
      group: '^archlinux-([a-z]+)-\d{4}\.\d{2}\.\d{2}-x86_64\.iso$'

  ubuntu:
    strategy: directory_index
    page_url: "https://ubuntu.com/download"
    params:
      # releases.ubuntu.com lists 24.04.3, 24.04.4, 25.10 and 26.04 side by side, so a
      # single `desktop` variant would silently flip its support line the week 26.10
      # lands. Each channel is therefore its own variant: `-lts` stays pinned to the
      # long-term line, `-latest` takes the newest release whether or not it is an LTS,
      # and flipping is what `-latest` advertises rather than a surprise.
      #
      # The split is latest-vs-LTS, NOT interim-vs-LTS: nobody on 25.10 wants to *stay*
      # on 25.10 -- wanting a non-LTS means wanting the newest thing. An `interim` channel
      # also names a line some flavours never publish (Ubuntu Unity ships LTS only), which
      # left `ubuntu-unity:desktop-interim` unresolved from the day it was added.
      #
      # `.04` alone does not mean LTS -- 25.04 is not one. `select.is_lts` has the even-year
      # rule; `select.CHANNELS` is the validated set of values `channel:` may take.
      version_dir: "https://releases.ubuntu.com/"
      index: "{version}/"
      sums: "SHA256SUMS"
      sig: "SHA256SUMS.gpg"
      version_pattern: 'ubuntu-([0-9.]+)-'
      # `{filename}.torrent` sits beside the ISO. Ubuntu does not publish a checksum
      # for it, so the torrent is trust-on-first-use -- but the ISO stays GPG-signed,
      # so `verify` is unchanged and the torrent is a bonus channel.
      torrent: "{filename}.torrent"
      signing_key:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x843938DF228D22F7B3742BC0D94AA3F0EFE21092
        fingerprint: 843938DF228D22F7B3742BC0D94AA3F0EFE21092
        covers: checksums
    variants:
      # Multi-arch, but the arm64 ISOs live on a DIFFERENT host (cdimage.ubuntu.com, under
      # `{version}/release/`), so aarch64 is a hand-seeded override -- arch discovery only sees
      # the amd64 host (releases.ubuntu.com) and proposes nothing. The match `$`-anchor keeps the
      # `live-server-arm64+largemem.iso` decoy out. cdimage carries its own SHA256SUMS/.gpg/.torrent.
      desktop-lts: {label: "Ubuntu Desktop LTS", arches: {x86_64: amd64, aarch64: {token: arm64, version_dir: "https://cdimage.ubuntu.com/releases/", index: "{version}/release/"}}, params: {channel: lts, match: '^ubuntu-[0-9.]+-desktop-{token}\.iso$'}}
      live-server-lts: {label: "Ubuntu Server LTS", arches: {x86_64: amd64, aarch64: {token: arm64, version_dir: "https://cdimage.ubuntu.com/releases/", index: "{version}/release/"}}, params: {channel: lts, match: '^ubuntu-[0-9.]+-live-server-{token}\.iso$'}}
      desktop-latest: {label: "Ubuntu Desktop latest", arches: {x86_64: amd64, aarch64: {token: arm64, version_dir: "https://cdimage.ubuntu.com/releases/", index: "{version}/release/"}}, params: {channel: latest, match: '^ubuntu-[0-9.]+-desktop-{token}\.iso$'}}
      live-server-latest: {label: "Ubuntu Server latest", arches: {x86_64: amd64, aarch64: {token: arm64, version_dir: "https://cdimage.ubuntu.com/releases/", index: "{version}/release/"}}, params: {channel: latest, match: '^ubuntu-[0-9.]+-live-server-{token}\.iso$'}}
