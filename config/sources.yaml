  # Ubuntu flavors. Same shape as `ubuntu` but wholly on cdimage.ubuntu.com/<flavor>/releases/
  # (the main archive only carries Ubuntu itself). Same GPG-signed SHA256SUMS under the Ubuntu
  # CD Image key, same even-year LTS/latest channel split -- which is why each is `enumerable:
